name: Build Android TWA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android Build Tools
        run: sdkmanager "build-tools;35.0.0"

      - name: Restore Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      - name: Create TWA Project
        run: |
          mkdir -p twa-project/app/src/main/res/values
          mkdir -p twa-project/app/src/main/res/mipmap-xxxhdpi
          mkdir -p twa-project/app/src/main/res/xml
          mkdir -p twa-project/gradle/wrapper

          # Download icon
          curl -sL "https://gujwatourjeju-collab.github.io/seatime/icon-512.png" -o twa-project/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

          # settings.gradle
          cat > twa-project/settings.gradle << 'SETTINGS'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "badangttae"
          include ':app'
          SETTINGS

          # Top-level build.gradle
          cat > twa-project/build.gradle << 'BUILD'
          plugins {
              id 'com.android.application' version '8.2.2' apply false
          }
          BUILD

          # gradle.properties
          cat > twa-project/gradle.properties << 'PROPS'
          android.useAndroidX=true
          org.gradle.jvmargs=-Xmx2048m
          PROPS

          # gradle wrapper properties
          cat > twa-project/gradle/wrapper/gradle-wrapper.properties << 'WRAPPER'
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
          WRAPPER

          # App build.gradle
          cat > twa-project/app/build.gradle << 'APPBUILD'
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.badangttae.app'
              compileSdk 35

              defaultConfig {
                  applicationId "com.badangttae.app"
                  minSdk 21
                  targetSdk 35
                  versionCode 3
                  versionName "1.0.2"

                  manifestPlaceholders = [
                      hostName: "gujwatourjeju-collab.github.io",
                      defaultUrl: "https://gujwatourjeju-collab.github.io/seatime/",
                      launcherName: "바당때",
                      assetStatements: '[{"relation": ["delegate_permission/common.handle_all_urls"], "target": {"namespace": "web", "site": "https://gujwatourjeju-collab.github.io"}}]'
                  ]
              }

              signingConfigs {
                  release {
                      storeFile file("../../keystore.jks")
                      storePassword System.getenv("KEYSTORE_PASSWORD")
                      keyAlias "badangttae"
                      keyPassword System.getenv("KEYSTORE_PASSWORD")
                  }
              }

              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }

          dependencies {
              implementation 'androidx.browser:browser:1.8.0'
              implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
          }
          APPBUILD

          # AndroidManifest.xml
          cat > twa-project/app/src/main/AndroidManifest.xml << 'MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">

              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="${launcherName}"
                  android:theme="@style/Theme.LauncherTheme">

                  <meta-data
                      android:name="asset_statements"
                      android:value='${assetStatements}' />

                  <activity
                      android:name="com.badangttae.app.LauncherActivity"
                      android:exported="true"
                      android:theme="@style/Theme.LauncherTheme">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                      <intent-filter android:autoVerify="true">
                          <action android:name="android.intent.action.VIEW" />
                          <category android:name="android.intent.category.DEFAULT" />
                          <category android:name="android.intent.category.BROWSABLE" />
                          <data android:scheme="https"
                               android:host="${hostName}"
                               android:pathPrefix="/seatime" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          MANIFEST

          # LauncherActivity.java (TWA)
          mkdir -p twa-project/app/src/main/java/com/badangttae/app
          cat > twa-project/app/src/main/java/com/badangttae/app/LauncherActivity.java << 'JAVA'
          package com.badangttae.app;

          import android.net.Uri;

          public class LauncherActivity extends com.google.androidbrowserhelper.trusted.LauncherActivity {
              @Override
              protected Uri getLaunchingUrl() {
                  return Uri.parse("https://gujwatourjeju-collab.github.io/seatime/");
              }
          }
          JAVA

          # Theme (splash screen color)
          cat > twa-project/app/src/main/res/values/styles.xml << 'STYLES'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.LauncherTheme" parent="android:Theme.NoTitleBar">
                  <item name="android:windowBackground">#060f1e</item>
                  <item name="android:statusBarColor">#060f1e</item>
                  <item name="android:navigationBarColor">#060f1e</item>
              </style>
          </resources>
          STYLES

          # strings.xml
          cat > twa-project/app/src/main/res/values/strings.xml << 'STRINGS'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">바당때</string>
          </resources>
          STRINGS

      - name: Build APK
        working-directory: twa-project
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          gradle wrapper --gradle-version 8.2
          ./gradlew bundleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: badangttae-aab
          path: twa-project/app/build/outputs/bundle/release/*.aab

      - name: Get signing fingerprint
        run: |
          keytool -list -v -keystore keystore.jks \
            -alias badangttae \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} | grep SHA256
