name: Build Android TWA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Generate Keystore
        run: |
          keytool -genkeypair \
            -alias badangttae \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -keystore keystore.jks \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
            -keypass ${{ secrets.KEYSTORE_PASSWORD }} \
            -dname "CN=Badangttae Dev, OU=Dev, O=Badangttae, C=KR"

      - name: Initialize TWA Project
        run: |
          bubblewrap init \
            --manifest="https://gujwatourjeju-collab.github.io/seatime/manifest.json" \
            --directory=twa-output
        env:
          # Auto-accept defaults
          BUBBLEWRAP_ACCEPT_DEFAULTS: true

      - name: Copy Keystore
        run: cp keystore.jks twa-output/

      - name: Build APK & AAB
        working-directory: twa-output
        run: |
          bubblewrap build \
            --skipPwaValidation \
            --signingKeyPath=keystore.jks \
            --signingKeyAlias=badangttae
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: badangttae-apk
          path: twa-output/app-release-signed.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: badangttae-aab
          path: twa-output/app-release-bundle.aab

      - name: Get signing fingerprint
        run: |
          keytool -list -v -keystore keystore.jks \
            -alias badangttae \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} | grep SHA256
