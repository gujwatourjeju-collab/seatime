name: Build Android App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android Build Tools
        run: sdkmanager "build-tools;35.0.0"

      - name: Restore Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      - name: Create Capacitor Project
        run: |
          mkdir -p cap-project/www
          cd cap-project

          echo '<html><head><meta charset="utf-8"><title>badangttae</title></head><body></body></html>' > www/index.html

          cat > package.json << 'PKG'
          {
            "name": "badangttae",
            "version": "1.0.5",
            "private": true
          }
          PKG

          npm install @capacitor/core @capacitor/cli @capacitor/android

          cat > capacitor.config.json << 'CAP'
          {
            "appId": "com.badangttae.app",
            "appName": "badangttae",
            "webDir": "www",
            "server": {
              "url": "https://gujwatourjeju-collab.github.io/seatime/",
              "cleartext": false
            }
          }
          CAP

          npx cap add android

      - name: Configure Android Project
        run: |
          cd cap-project

          # Copy keystore into android project
          cp ../keystore.jks android/keystore.jks

          # Add signing config to app/build.gradle
          cd android

          # Fix Kotlin duplicate classes - add resolution strategy to root build.gradle
          cat >> build.gradle << 'KOTLIN_FIX'

          subprojects {
              configurations.all {
                  resolutionStrategy {
                      force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.24'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.24'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.24'
                  }
              }
          }
          KOTLIN_FIX

          # Insert signingConfigs before buildTypes
          sed -i '/buildTypes {/i\
              signingConfigs {\
                  release {\
                      storeFile file("../keystore.jks")\
                      storePassword System.getenv("KEYSTORE_PASSWORD")\
                      keyAlias "badangttae"\
                      keyPassword System.getenv("KEYSTORE_PASSWORD")\
                  }\
              }' app/build.gradle

          # Add signingConfig to release buildType
          sed -i '/release {/,/}/{s/minifyEnabled false/signingConfig signingConfigs.release\n                minifyEnabled false/}' app/build.gradle

          # Update version
          sed -i 's/versionCode 1/versionCode 7/' app/build.gradle
          sed -i 's/versionName "1.0"/versionName "1.0.6"/' app/build.gradle

          # Set app theme colors (status bar, nav bar, splash)
          cat > app/src/main/res/values/styles.xml << 'STYLES'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.NoActionBar">
                  <item name="android:statusBarColor">#060f1e</item>
                  <item name="android:navigationBarColor">#060f1e</item>
                  <item name="android:windowBackground">#060f1e</item>
              </style>
              <style name="AppTheme.NoActionBar" parent="AppTheme">
                  <item name="android:windowActionBar">false</item>
                  <item name="android:windowNoTitle">true</item>
              </style>
              <style name="AppTheme.NoActionBarLaunch" parent="Theme.SplashScreen">
                  <item name="windowSplashScreenBackground">#060f1e</item>
                  <item name="android:statusBarColor">#060f1e</item>
                  <item name="android:navigationBarColor">#060f1e</item>
              </style>
          </resources>
          STYLES

          # App icon - download and set for all densities + adaptive icon
          curl -sL "https://gujwatourjeju-collab.github.io/seatime/icon-512.png" -o /tmp/icon.png
          for dir in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            mkdir -p app/src/main/res/$dir
            cp /tmp/icon.png app/src/main/res/$dir/ic_launcher.png
            cp /tmp/icon.png app/src/main/res/$dir/ic_launcher_round.png
            cp /tmp/icon.png app/src/main/res/$dir/ic_launcher_foreground.png
          done

          # Adaptive icon XML
          mkdir -p app/src/main/res/mipmap-anydpi-v26
          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'ICON'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/ic_launcher_background"/>
              <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
          </adaptive-icon>
          ICON
          cp app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml

          # Icon background color - overwrite existing file
          echo '<?xml version="1.0" encoding="utf-8"?><resources><color name="ic_launcher_background">#060f1e</color></resources>' > app/src/main/res/values/ic_launcher_background.xml

          # Add location permissions to AndroidManifest
          sed -i '/<application/i\    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />' app/src/main/AndroidManifest.xml

          # Set app label in strings.xml
          sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">badangttae<\/string>/' app/src/main/res/values/strings.xml
          sed -i 's/<string name="title_activity_main">.*<\/string>/<string name="title_activity_main">badangttae<\/string>/' app/src/main/res/values/strings.xml
          sed -i 's/<string name="package_name">.*<\/string>/<string name="package_name">com.badangttae.app<\/string>/' app/src/main/res/values/strings.xml
          sed -i 's/<string name="custom_url_scheme">.*<\/string>/<string name="custom_url_scheme">com.badangttae.app<\/string>/' app/src/main/res/values/strings.xml

      - name: Build AAB
        working-directory: cap-project/android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: ./gradlew bundleRelease

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: badangttae-aab
          path: cap-project/android/app/build/outputs/bundle/release/*.aab
