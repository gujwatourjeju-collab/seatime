<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>바당때</title>
<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/gujwatourjeju-collab/seatime/main/logo.png">
<link rel="apple-touch-icon" href="https://raw.githubusercontent.com/gujwatourjeju-collab/seatime/main/logo.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="바당때">
<meta name="theme-color" content="#071320">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --accent: #00e5c3;
  --water-top: #00b4d8;
  --water-mid: #0077b6;
  --water-deep: #023e8a;
  --sky: #071320;
}

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--sky);
  color: #fff;
  height: 100dvh;
  overflow: hidden;
  position: relative;
}

/* ════════════════════════════════
   SPLASH
════════════════════════════════ */
#splash {
  position: fixed; inset: 0; z-index: 9999;
  background: #040d18;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  overflow: hidden;
  transition: opacity 0.8s ease, transform 0.8s ease;
}
#splash.hide { opacity: 0; transform: scale(1.05); pointer-events: none; }

.splash-stars { position: absolute; inset: 0; overflow: hidden; }
.splash-star {
  position: absolute; border-radius: 50%; opacity: 0;
  animation: sTwinkle var(--d,3s) ease-in-out var(--delay,0s) infinite;
}
@keyframes sTwinkle { 0%,100%{opacity:0} 50%{opacity:var(--op,.5)} }

#splash-water {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 0%; transition: height 0s; pointer-events: none;
}
.s-water-body {
  position: absolute; top: -60px; left: 0; right: 0; bottom: 0;
  background: linear-gradient(180deg,
    rgba(0,180,216,0) 0%,
    rgba(0,150,200,.25) 20%,
    rgba(0,100,160,.55) 50%,
    rgba(2,50,120,.9) 100%
  );
}
.s-wave {
  position: absolute; top: 0; left: -60%; width: 220%; height: 60px;
  border-radius: 50%; background: rgba(0,229,195,.3);
  animation: sWave 3.5s ease-in-out infinite;
}
.s-wave2 {
  position: absolute; top: 14px; left: -40%; width: 180%; height: 40px;
  border-radius: 50%; background: rgba(0,180,216,.18);
  animation: sWave 5.5s ease-in-out -2s infinite;
}
@keyframes sWave { 0%,100%{transform:translateX(0)} 50%{transform:translateX(-9%)} }

.splash-content {
  position: relative; z-index: 2;
  display: flex; flex-direction: column; align-items: center;
}
.splash-logo {
  width: 72px; height: 72px; border-radius: 18px;
  object-fit: cover; margin-bottom: 20px;
  box-shadow: 0 0 40px rgba(0,229,195,.35);
  animation: sFloat 3s ease-in-out infinite;
}
@keyframes sFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
.splash-title {
  font-size: 1.1rem; font-weight: 300; letter-spacing: 6px;
  color: rgba(255,255,255,.5); text-transform: uppercase;
}
.splash-title-ko {
  font-size: 2.2rem; font-weight: 900; letter-spacing: -1px;
  margin-top: -2px;
  background: linear-gradient(135deg, #fff 30%, var(--accent));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.splash-sub {
  font-size: .62rem; font-weight: 500; color: rgba(255,255,255,.35);
  letter-spacing: 1.2px; margin-top: 8px;
}
#splash-status {
  margin-top: 24px; font-size: .58rem; font-weight: 500;
  letter-spacing: 3px; color: rgba(255,255,255,.25); min-height: 1em;
}

/* ════════════════════════════════
   OCEAN
════════════════════════════════ */
#ocean {
  position: fixed; inset: 0; z-index: 0;
  overflow: hidden;
}

#ocean-sky {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, #071320 0%, #0d2a4a 50%, #0a3d5c 100%);
  transition: background 4s ease, filter 4s ease;
}

#ocean-water {
  position: absolute; left: 0; right: 0; bottom: 0;
  height: 40%;
  transition: height 5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

#water-body {
  position: absolute; inset: 0;
  background: linear-gradient(180deg,
    rgba(0,180,216,.05) 0%,
    rgba(0,150,200,.35) 6%,
    rgba(0,100,160,.65) 30%,
    rgba(2,50,120,.92) 70%,
    rgba(1,30,80,1) 100%
  );
  transition: background 4s ease;
}

#waves {
  position: absolute; top: 0; left: 0; right: 0;
  height: 80px; overflow: hidden;
}
.wave-svg {
  position: absolute; top: 0; left: -10%; width: 120%; height: 100%;
}
.wave-path-1 { animation: waveDrift1 3.5s ease-in-out infinite; }
.wave-path-2 { animation: waveDrift2 5s ease-in-out infinite; }
.wave-path-3 { animation: waveDrift3 7s ease-in-out -2s infinite; }
@keyframes waveDrift1 { 0%,100%{transform:translateX(0)} 50%{transform:translateX(-6%)} }
@keyframes waveDrift2 { 0%,100%{transform:translateX(-4%)} 50%{transform:translateX(5%)} }
@keyframes waveDrift3 { 0%,100%{transform:translateX(3%)} 50%{transform:translateX(-5%)} }

.shimmer {
  position: absolute; top: 0; bottom: 0; width: 1px;
  background: linear-gradient(180deg, transparent 0%, rgba(0,229,195,.12) 40%, transparent 100%);
  animation: shimmerAnim var(--d,8s) ease-in-out var(--delay,0s) infinite;
  opacity: 0; transform-origin: top;
}
@keyframes shimmerAnim {
  0%,100%{opacity:0;transform:scaleY(.2) skewX(-15deg)}
  40%,60%{opacity:1;transform:scaleY(1) skewX(-10deg)}
}

#horizon {
  position: absolute; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent 0%, rgba(0,229,195,.3) 20%, rgba(0,200,220,.6) 50%, rgba(0,229,195,.3) 80%, transparent 100%);
  box-shadow: 0 0 12px rgba(0,229,195,.25), 0 0 40px rgba(0,180,216,.15);
  transition: top 5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  pointer-events: none;
}

/* ════ 날씨 스카이 오브젝트 ════ */
#sky-objects { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
#sky-sun {
  position: absolute; border-radius: 50%;
  background: radial-gradient(circle, rgba(255,245,180,1) 30%, rgba(255,220,80,.6) 60%, transparent 100%);
  box-shadow: 0 0 40px rgba(255,230,100,.5), 0 0 80px rgba(255,200,60,.25);
  transition: opacity 2s ease;
}
.sun-rays {
  position: absolute; inset: -50%; border-radius: 50%;
  background: radial-gradient(circle, rgba(255,230,120,.15) 40%, transparent 70%);
  animation: sunPulse 4s ease-in-out infinite;
}
@keyframes sunPulse { 0%,100%{transform:scale(1);opacity:.8} 50%{transform:scale(1.12);opacity:1} }

.sky-cloud {
  position: absolute;
  background: radial-gradient(ellipse at 50% 60%, rgba(255,255,255,.18) 0%, rgba(255,255,255,.06) 60%, transparent 100%);
  border-radius: 50%;
  animation: cloudDrift var(--cd, 30s) linear var(--cdelay, 0s) infinite;
  transition: opacity 2s ease;
}
@keyframes cloudDrift { from{transform:translateX(0)} to{transform:translateX(var(--cx,10%))} }

#rain-container {
  position: absolute; inset: 0; overflow: hidden;
  opacity: 0; transition: opacity 2s ease; pointer-events: none;
}
.raindrop {
  position: absolute; top: -20px; width: 1.5px; border-radius: 2px;
  background: linear-gradient(180deg, transparent, rgba(180,220,255,.5));
  animation: rainFall var(--rd,.8s) linear var(--rdelay,0s) infinite;
}
@keyframes rainFall {
  0%{transform:translateY(0) translateX(0);opacity:0}
  10%{opacity:1} 90%{opacity:.6}
  100%{transform:translateY(110vh) translateX(-30px);opacity:0}
}

/* ════════════════════════════════
   수위 게이지 — 우측 세로 바

   ★★★ 핵심 수정 ★★★
   게이지 트랙: top=28dvh ~ bottom=10dvh (top:28%, bottom:10%)
   
   [이전 버그]
   - 물높이: pct → px 변환 후 화면 % 로 재변환 (복잡한 공식)
   - 도트: gauge-fill-bar 내 bottom:calc(pct%-4px)
   - 두 계산이 달라서 시각적 불일치 발생
   
   [수정 후]
   - 게이지 fill-bar: height=pct%, 도트는 fill-bar 최상단에 고정
   - 물높이: 게이지 트랙 좌표 기반으로 정확히 역산
     trackTopPx = vh*0.28, trackBottomPx = vh*0.90
     dotY(screen) = trackBottomPx - pct/100 * trackH
     waterHeight = vh - dotY = vh - trackBottomPx + pct/100*trackH
     waterPct = waterHeight/vh*100
   - 결과: 도트 위치 = 수면 위치 수학적으로 일치
════════════════════════════════ */
#gauge-rail {
  position: fixed; right: 14px; top: 0; bottom: 0;
  width: 2px; z-index: 20;
  display: flex; flex-direction: column; align-items: center;
  pointer-events: none;
}
#gauge-track {
  position: absolute; top: 28%; bottom: 10%;
  width: 2px; background: rgba(255,255,255,.08); border-radius: 1px;
}
#gauge-fill-bar {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(180deg, rgba(0,229,195,.35), rgba(0,180,216,.55));
  border-radius: 1px;
  height: 40%;
  /* transition은 JS에서 동적으로 제어 */
}
#gauge-dot {
  position: absolute;
  left: 50%; transform: translate(-50%, -50%);
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent);
  border: 2px solid #071320;
  box-shadow: 0 0 10px rgba(0,229,195,.9), 0 0 20px rgba(0,229,195,.4);
  /* top은 JS에서 동적 계산:
     트랙 상단(만조) = 28%, 트랙 하단(간조) = 90%
     top = 90% - pct/100 * (90%-28%) = 90% - pct*0.62%  */
}
#gauge-high-label {
  position: absolute; right: 22px; top: 28%;
  transform: translateY(-50%);
  display: flex; align-items: center; gap: 6px;
}
#gauge-high-val { font-family:'DM Mono',monospace; font-size:.65rem; font-weight:500; color:rgba(255,255,255,.55); display:block; line-height:1; }
#gauge-high-name { font-size:.46rem; font-weight:700; color:rgba(255,255,255,.28); letter-spacing:1px; }
#gauge-low-label {
  position: absolute; right: 22px; bottom: 10%;
  transform: translateY(50%);
  display: flex; align-items: center; gap: 6px;
}
#gauge-low-val { font-family:'DM Mono',monospace; font-size:.65rem; font-weight:500; color:rgba(255,255,255,.38); display:block; line-height:1; }
#gauge-low-name { font-size:.46rem; font-weight:700; color:rgba(255,255,255,.18); letter-spacing:1px; }

/* ════════════════════════════════
   앱 레이아웃
════════════════════════════════ */
#app {
  position: fixed; inset: 0; z-index: 10;
  width: 100%; max-width: 480px; margin: 0 auto;
  display: flex; flex-direction: column;
  pointer-events: none;
}
#app > * { pointer-events: auto; }

#header {
  padding: calc(env(safe-area-inset-top, 44px) + 8px) 20px 0;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.hdr-left { display: flex; align-items: center; gap: 10px; }
.hdr-logo { width:30px; height:30px; border-radius:8px; object-fit:cover; opacity:.85; }
.hdr-brand { font-size:.72rem; font-weight:700; letter-spacing:3px; color:rgba(255,255,255,.45); text-transform:uppercase; }
.hdr-sub { font-size:.45rem; font-weight:400; color:rgba(255,255,255,.22); letter-spacing:.3px; margin-top:1px; }
.hdr-right { display:flex; flex-direction:column; align-items:flex-end; gap:1px; }
#clock { font-family:'DM Mono',monospace; font-size:.95rem; font-weight:400; color:rgba(255,255,255,.7); letter-spacing:1px; line-height:1; }
#lunar { font-size:.55rem; font-weight:500; color:rgba(255,255,255,.3); letter-spacing:.3px; }

#controls { padding:10px 16px 0; display:flex; gap:8px; flex-shrink:0; }
.loc-btn, .date-nav {
  flex:1; display:flex; align-items:center; padding:8px 12px; border-radius:12px; gap:6px;
  background:rgba(0,0,0,.3); border:1px solid rgba(255,255,255,.1);
  backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  color:rgba(255,255,255,.8); font-size:.72rem; font-weight:600;
  cursor:pointer; font-family:'Noto Sans KR',sans-serif; transition:all .2s; min-width:0;
}
.loc-btn:active, .date-nav-btn:active { background:rgba(0,229,195,.1); }
.loc-text { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.loc-arrow { font-size:.55rem; opacity:.4; flex-shrink:0; }
.date-nav { padding:0; overflow:hidden; }
.date-nav-btn { width:30px; height:100%; flex-shrink:0; background:none; border:none; color:rgba(255,255,255,.45); font-size:1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .15s; }
.date-nav-btn:active { color:var(--accent); }
.date-nav-ctr { flex:1; text-align:center; padding:8px 2px; cursor:pointer; min-width:0; }
.date-solar { font-family:'DM Mono',monospace; font-size:.68rem; color:#fff; }
.date-label { font-size:.5rem; font-weight:700; color:var(--accent); margin-top:1px; letter-spacing:.5px; }

#weather { display:none; align-items:center; gap:8px; padding:8px 20px 0; flex-shrink:0; }
#weather.show { display:flex; }
.wx-icon { font-size:.95rem; }
.wx-text { flex:1; font-size:.65rem; font-weight:600; color:rgba(255,255,255,.55); }
.wx-wind { font-family:'DM Mono',monospace; font-size:.7rem; color:var(--accent); }

/* ★ 히어로 영역: margin-top으로 전체를 위로 당김 */
#hero {
  flex: 1;
  display: flex; flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 0 24px;
  pointer-events: none;
  margin-top: -20px; /* ★ 히어로+패널 전체를 위로 20px 당김 */
}
#hero-inner {
  display: none; flex-direction: column;
  align-items: center; text-align: center; gap: 4px;
}
.tide-badge {
  display: inline-block;
  background: rgba(0,229,195,.15); border: 1px solid rgba(0,229,195,.3);
  backdrop-filter: blur(8px); color: var(--accent);
  font-size: .62rem; font-weight: 900;
  padding: 3px 10px; border-radius: 20px; letter-spacing: .5px;
  align-self: center;
}
.tide-desc { font-size:.6rem; color:rgba(255,255,255,.42); font-weight:500; margin-top:2px; margin-bottom:6px; }
#app * { text-shadow: 0 1px 6px rgba(0,0,0,.5); }
#level-big {
  font-family: 'DM Mono', monospace;
  font-size: 5rem; font-weight: 300; line-height: 1; letter-spacing: -4px; color: #fff;
  text-shadow: 0 0 60px rgba(0,229,195,.4), 0 2px 20px rgba(0,0,0,.7), 0 4px 40px rgba(0,0,0,.5);
}
#level-unit { font-size:1.5rem; opacity:.4; margin-left:2px; vertical-align:bottom; }
.tide-status-row { display:flex; align-items:center; justify-content:center; gap:8px; margin-top:2px; }
.status-pill { background:rgba(0,0,0,.25); backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,.1); padding:4px 10px; border-radius:20px; font-size:.65rem; font-weight:700; color:var(--accent); }
.timeleft-pill { background:rgba(0,0,0,.25); backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,.08); padding:4px 10px; border-radius:20px; font-family:'DM Mono',monospace; font-size:.62rem; color:rgba(255,255,255,.55); }
.station-pill { font-size:.65rem; color:rgba(255,255,255,.9); font-weight:700; letter-spacing:.5px; text-shadow:0 1px 3px rgba(0,0,0,.6); }
.hero-top-row { display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:2px; }

/* ★ 조석 패널: margin-top을 더 올려서 히어로와 붙임 */
#tide-panel {
  flex-shrink: 0;
  max-height: 44dvh;
  display: flex; flex-direction: column;
  margin-top: -45px; /* ★ 기존 -25px → -45px (더 위로) */
  position: relative; z-index: 10;
}
#tide-panel::before {
  content: ''; display: block; flex-shrink: 0; height: 32px;
  background: linear-gradient(180deg, transparent, rgba(0,0,0,.0));
  pointer-events: none;
}

.panel-hdr { display:flex; align-items:center; justify-content:center; gap:30px; padding:0 0 10px; flex-shrink:0; }
.panel-title { font-size:.68rem; font-weight:900; color:#fff; letter-spacing:2px; text-transform:uppercase; text-shadow:0 1px 6px rgba(0,0,0,0.8); }
.panel-upd { font-family:'DM Mono',monospace; font-size:.62rem; color:rgba(255,255,255,.9); text-shadow:0 1px 4px rgba(0,0,0,0.6); font-weight:500; }

.tide-scroll { overflow-y:auto; padding:0 16px; scrollbar-width:none; flex:1; }
.tide-scroll::-webkit-scrollbar { display:none; }
.tide-row { display:flex; align-items:center; justify-content:center; gap:30px; padding:8px 6px; border-bottom:1px solid rgba(255,255,255,.05); transition:opacity .2s; }
.tide-row:last-child { border-bottom:none; }
.tide-row.is-current { padding:10px 6px; border-bottom:1px solid rgba(0,229,195,.1); border-top:1px solid rgba(0,229,195,.1); margin:2px 0; }
.tide-row.is-dim { opacity:.18; } /* 어제/내일 더 흐리게 */
.tr-left { display:flex; align-items:center; gap:10px; width:110px; }
.tr-icon { font-size:.8rem; width:14px; text-align:center; }
/* 오늘 데이터 기본 밝기 올림 */
.tr-level { font-family:'DM Mono',monospace; font-size:.95rem; font-weight:700; color:#fff; }
.tr-label { font-size:.55rem; color:rgba(255,255,255,.45); font-weight:600; margin-top:1px; }
.tr-time { font-family:'DM Mono',monospace; font-size:.88rem; font-weight:500; color:rgba(255,255,255,.7); width:50px; text-align:left; }
.day-tag { font-size:.5rem; background:rgba(255,255,255,.07); color:rgba(255,255,255,.35); padding:1px 5px; border-radius:4px; font-weight:700; margin-left:5px; vertical-align:middle; }

.loading { display:flex; flex-direction:column; align-items:center; justify-content:center; height:80px; gap:10px; }
.ld-dots { display:flex; gap:4px; }
.ld-dot { width:5px; height:5px; border-radius:50%; background:var(--accent); opacity:.25; animation:ldPulse 1.2s ease-in-out infinite; }
.ld-dot:nth-child(2){animation-delay:.2s} .ld-dot:nth-child(3){animation-delay:.4s}
@keyframes ldPulse { 0%,100%{opacity:.25;transform:scale(1)} 50%{opacity:1;transform:scale(1.4)} }
.ld-text { font-size:.62rem; font-weight:700; color:rgba(255,255,255,.25); letter-spacing:1px; }
.err-msg { text-align:center; padding:16px; color:#ff6b6b; font-size:.75rem; font-weight:700; }
.empty { display:flex; flex-direction:column; align-items:center; justify-content:center; height:80px; gap:8px; color:rgba(255,255,255,.2); }
.empty-icon { font-size:1.8rem; opacity:.3; }
.empty-text { font-size:.7rem; font-weight:700; text-align:center; line-height:1.6; }

#footer { padding:6px 20px calc(env(safe-area-inset-bottom,16px) + 6px); text-align:center; flex-shrink:0; }
.credit { font-size:.5rem; color:rgba(255,255,255,.15); font-weight:600; }
.credit a { color:rgba(255,255,255,.18); text-decoration:none; }

#refresh-btn {
  position: fixed; bottom: calc(env(safe-area-inset-bottom,16px) + 16px); right: 36px;
  width:42px; height:42px; border-radius:50%;
  background:rgba(0,0,0,.4); border:1px solid rgba(0,229,195,.3);
  backdrop-filter:blur(12px); color:var(--accent); cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all .2s; z-index:100;
}
#refresh-btn:active { transform:scale(.9); }
#refresh-btn.spinning svg { animation:spin .8s linear; }
@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

.sheet-overlay { position:fixed; inset:0; z-index:200; background:rgba(0,0,0,.6); opacity:0; pointer-events:none; transition:opacity .3s; }
.sheet-overlay.open { opacity:1; pointer-events:auto; }
.sheet { position:fixed; bottom:0; left:0; right:0; z-index:201; max-width:480px; margin:0 auto; background:#071420; border-radius:24px 24px 0 0; border-top:1px solid rgba(0,229,195,.12); transform:translateY(100%); transition:transform .35s cubic-bezier(.4,0,.2,1); padding-bottom:env(safe-area-inset-bottom); }
.sheet.open { transform:translateY(0); }
.sheet-handle { width:36px; height:4px; border-radius:2px; background:rgba(255,255,255,.12); margin:12px auto 0; }
.sheet-step { padding:16px 20px 24px; }

<script>
/* ════ CONFIG ════ */
const SUPABASE_URL = 'https://raykkfvchlfsjtlkbpji.supabase.co';
const SUPABASE_KEY = 'sb_publishable_HV81jL04Eq8m52cMm-LhSw_FX9pSikn';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ════ 지역 테마 ════ */
const THEMES = {
  jeju: {sky:'linear-gradient(180deg,#0e4a6e 0%,#1a7a96 30%,#1faaa8 60%,#12c4a8 90%,#0db898 100%)',w1:'rgba(0,220,195,.3)',w2:'rgba(0,185,185,.2)',wb:'linear-gradient(180deg,rgba(0,220,190,.1) 0%,rgba(0,185,185,.45) 8%,rgba(0,138,168,.74) 30%,rgba(0,85,135,.95) 70%,rgba(0,48,98,1) 100%)',accent:'#00e5c3',horizonColor:'rgba(0,229,195,.65)'},
  west: {sky:'linear-gradient(180deg,#1e3a70 0%,#2e5598 30%,#4a84c0 60%,#6aa0d4 90%,#80b4e0 100%)',w1:'rgba(120,168,240,.3)',w2:'rgba(90,130,210,.2)',wb:'linear-gradient(180deg,rgba(90,130,210,.1) 0%,rgba(75,112,180,.45) 8%,rgba(52,85,150,.74) 30%,rgba(28,52,108,.95) 70%,rgba(14,32,80,1) 100%)',accent:'#7ab3f0',horizonColor:'rgba(122,179,240,.65)'},
  south:{sky:'linear-gradient(180deg,#103860 0%,#1a5a90 30%,#1a8cc5 60%,#1abcd8 90%,#14d0d8 100%)',w1:'rgba(60,210,238,.3)',w2:'rgba(35,175,215,.2)',wb:'linear-gradient(180deg,rgba(35,175,215,.1) 0%,rgba(28,145,178,.45) 8%,rgba(20,105,152,.74) 30%,rgba(10,62,108,.95) 70%,rgba(5,36,76,1) 100%)',accent:'#40c8e0',horizonColor:'rgba(64,200,224,.65)'},
  east: {sky:'linear-gradient(180deg,#102258 0%,#1a3880 30%,#2058b0 60%,#2878d0 90%,#3090e8 100%)',w1:'rgba(70,130,235,.3)',w2:'rgba(48,102,210,.2)',wb:'linear-gradient(180deg,rgba(48,102,210,.1) 0%,rgba(36,82,170,.45) 8%,rgba(22,62,132,.74) 30%,rgba(12,40,90,.95) 70%,rgba(6,22,65,1) 100%)',accent:'#5b9cf5',horizonColor:'rgba(91,156,245,.65)'}
};
const WEATHER_FILTER={0:'none',1:'none',2:'brightness(.9) saturate(.85)',3:'brightness(.72) saturate(.6)',45:'brightness(.62) saturate(.45)',48:'brightness(.62) saturate(.45)',51:'brightness(.68) saturate(.55)',53:'brightness(.65) saturate(.5)',55:'brightness(.62) saturate(.48)',61:'brightness(.52) saturate(.42) hue-rotate(10deg)',63:'brightness(.46) saturate(.38) hue-rotate(12deg)',65:'brightness(.42) saturate(.32) hue-rotate(15deg)',80:'brightness(.38) saturate(.28)',95:'brightness(.3) saturate(.2)'};

let currentRegion='jeju', currentWeatherCode=0;

function getFilter(code){const keys=Object.keys(WEATHER_FILTER).map(Number).sort((a,b)=>a-b);let f='none';for(const k of keys){if(code>=k)f=WEATHER_FILTER[k];}return f;}
function applyTheme(region,wCode){
  currentRegion=region||'jeju';currentWeatherCode=wCode||0;
  const t=THEMES[currentRegion];
  const sky=document.getElementById('ocean-sky');
  sky.style.background=t.sky;sky.style.filter=getFilter(currentWeatherCode);
  document.getElementById('water-body').style.background=t.wb;
  document.querySelectorAll('.wave-path-1').forEach(p=>p.setAttribute('fill',t.w1));
  document.querySelectorAll('.wave-path-2').forEach(p=>p.setAttribute('fill',t.w2));
  document.documentElement.style.setProperty('--accent',t.accent);
  document.getElementById('horizon').style.background=`linear-gradient(90deg,transparent 0%,${t.horizonColor} 30%,${t.horizonColor} 70%,transparent 100%)`;
  buildShimmers(t.accent);
}
function buildShimmers(color){document.querySelectorAll('.shimmer').forEach(s=>s.remove());const wb=document.getElementById('water-body');for(let i=0;i<7;i++){const s=document.createElement('div');s.className='shimmer';s.style.cssText=`left:${8+i*13}%;height:${55+Math.random()*45}%;--d:${6+Math.random()*8}s;--delay:${Math.random()*6}s;background:linear-gradient(180deg,transparent 0%,${color}18 45%,transparent 100%)`;wb.appendChild(s);}}

/* ════════════════════════════════
   ★★★ 게이지 & 수면 동기화 핵심 로직 ★★★

   게이지 트랙: CSS top:28%, bottom:10% 고정
   → 화면 좌표: trackTopPx = vh*0.28, trackBottomPx = vh*0.90

   pct=0 (간조): 도트가 trackBottomPx에 위치 → 물높이 = vh - trackBottomPx = vh*0.10
   pct=100 (만조): 도트가 trackTopPx에 위치 → 물높이 = vh - trackTopPx = vh*0.72

   도트 screen Y = trackBottomPx - (pct/100) * trackH
   물높이(px) = vh - 도트 screen Y
   물높이(%) = 물높이(px) / vh * 100

   → 이 공식으로 게이지 도트와 수면이 항상 같은 높이
════════════════════════════════ */
let _lastPct=40, _isFalling=false;

function calcWaterPct(pct){
  const vh=window.innerHeight;
  const trackTopPx=vh*0.28;
  const trackBottomPx=vh*0.90;
  const trackH=trackBottomPx-trackTopPx;
  const dotScreenY=trackBottomPx-(pct/100)*trackH;
  return ((vh-dotScreenY)/vh)*100;
}

function setOceanLevel(pct,isFalling,animate=true){
  _lastPct=pct; _isFalling=isFalling;

  const water=document.getElementById('ocean-water');
  const horizon=document.getElementById('horizon');
  const fillBar=document.getElementById('gauge-fill-bar');
  const dot=document.getElementById('gauge-dot');

  // 물높이: 게이지 트랙(top 28% ~ bottom 10%) 기준으로 수면 위치 계산
  // pct=0(간조)이면 트랙 하단(화면 90% 지점) → 물높이 10%
  // pct=100(만조)이면 트랙 상단(화면 28% 지점) → 물높이 72%
  const vh=window.innerHeight;
  const trackTopPx=vh*0.28;
  const trackBottomPx=vh*0.90;
  const trackH=trackBottomPx-trackTopPx;
  const dotY=trackBottomPx-(pct/100)*trackH;   // 도트의 화면 Y좌표
  const waterPct=((vh-dotY)/vh)*100;            // 물높이 %
  const horizonTop=100-waterPct;

  const applyValues=()=>{
    water.style.height=waterPct+'%';
    horizon.style.top=horizonTop+'%';
    fillBar.style.height=pct+'%';
    dot.style.top=horizonTop+'%';  // 수면과 정확히 같은 위치
  };

  if(!animate){
    water.style.transition='none';
    horizon.style.transition='none';
    fillBar.style.transition='none';
    dot.style.transition='none';
    void water.offsetWidth;
    applyValues();
    setTimeout(()=>{
      water.style.transition='';
      horizon.style.transition='';
      fillBar.style.transition='';
      dot.style.transition='';
    },50);
    return;
  }

  const ease=isFalling?'cubic-bezier(0.55,0.05,0.7,0.4)':'cubic-bezier(0.2,0.6,0.35,1)';
  const dur='5s';
  const initPct=isFalling?100:0;
  const initDotY=trackBottomPx-(initPct/100)*trackH;
  const initWaterPct=((vh-initDotY)/vh)*100;

  // 애니메이션 시작값 즉시 적용
  water.style.transition='none';
  horizon.style.transition='none';
  fillBar.style.transition='none';
  dot.style.transition='none';
  void water.offsetWidth;
  water.style.height=initWaterPct+'%';
  horizon.style.top=(100-initWaterPct)+'%';
  fillBar.style.height=initPct+'%';
  dot.style.top=`${100-initWaterPct}%`;
  void water.offsetWidth;

  setTimeout(()=>{
    water.style.transition=`height ${dur} ${ease}`;
    horizon.style.transition=`top ${dur} ${ease}`;
    fillBar.style.transition=`height ${dur} ${ease}`;
    dot.style.transition=`top ${dur} ${ease}`;
    applyValues();
  },100);
}

/* ════ 날씨 스카이 오브젝트 ════ */
function updateSkyObjects(weatherCode){
  const sun=document.getElementById('sky-sun');
  const rainContainer=document.getElementById('rain-container');
  const skyObj=document.getElementById('sky-objects');
  skyObj.querySelectorAll('.sky-cloud').forEach(c=>c.remove());
  rainContainer.innerHTML='';
  const isClear=weatherCode<=1,isPartly=weatherCode===2,
        isCloudy=weatherCode===3||(weatherCode>=45&&weatherCode<=48),
        isDrizzle=weatherCode>=51&&weatherCode<=55,
        isRain=weatherCode>=61&&weatherCode<=65,
        isHeavy=weatherCode>=80&&weatherCode<=82,
        isStorm=weatherCode>=95;
  if(isClear){sun.style.opacity='1';sun.style.width='90px';sun.style.height='90px';sun.style.left='60%';sun.style.top='8%';}
  else if(isPartly){sun.style.opacity='.6';sun.style.width='70px';sun.style.height='70px';sun.style.left='62%';sun.style.top='9%';}
  else if(isCloudy){sun.style.opacity='.15';sun.style.width='60px';sun.style.height='60px';sun.style.left='62%';sun.style.top='10%';}
  else if(isDrizzle||isRain){sun.style.opacity='0';}
  else if(isHeavy||isStorm){sun.style.opacity='0';}
  else{sun.style.opacity='.5';sun.style.width='70px';sun.style.height='70px';sun.style.left='62%';sun.style.top='9%';}
  const cloudDefs=[];
  if(isPartly){cloudDefs.push({w:120,h:40,top:'12%',left:'30%',op:.5,speed:'40s',delay:'-10s',dx:'5%'},{w:80,h:28,top:'18%',left:'10%',op:.3,speed:'55s',delay:'-25s',dx:'8%'});}
  else if(isCloudy){cloudDefs.push({w:160,h:52,top:'8%',left:'5%',op:.55,speed:'35s',delay:'0s',dx:'6%'},{w:130,h:44,top:'14%',left:'40%',op:.45,speed:'50s',delay:'-15s',dx:'4%'},{w:100,h:34,top:'20%',left:'20%',op:.35,speed:'45s',delay:'-30s',dx:'7%'});}

function calcLive(data){
  if(!data||data.length<2)return 0;
  const now=new Date(),nm=now.getHours()*60+now.getMinutes();
  const past=[...data].reverse().find(d=>!d.isCurrent&&toMins(d)<=nm);
  const future=data.find(d=>!d.isCurrent&&toMins(d)>nm);
  if(!past||!future)return data[0]?.level||0;
  const td=toMins(future)-toMins(past),ld=future.level-past.level,prog=(nm-toMins(past))/td;
  return Math.round(past.level+(ld*(1-Math.cos(prog*Math.PI))/2));
}

function blendTides(d1,d2,w1,w2,tc,isToday){
  const t1=d1.filter(d=>!d.isCurrent),t2=d2.filter(d=>!d.isCurrent),cur=d1.find(d=>d.isCurrent);
  const used=new Set(),bl=[];
  const ts=dateToStr(getOffsetDate(selectedDateOffset)),ps=dateToStr(getOffsetDate(selectedDateOffset-1)),ns=dateToStr(getOffsetDate(selectedDateOffset+1));
  t1.forEach(a=>{const m=t2.filter(b=>b.type===a.type&&!used.has(b.time+b.date)&&b.date===a.date).sort((a2,b2)=>Math.abs(toMins(a2)-toMins(a))-Math.abs(toMins(b2)-toMins(a)))[0];if(!m)return;used.add(m.time+m.date);const bm=Math.round(toMins(a)*w1+toMins(m)*w2)+tc;let date,iy=false,in2=false;if(bm<0){date=ps;iy=true;}else if(bm>=1440){date=ns;in2=true;}else{date=ts;}bl.push({...a,time:minsToTime(bm),mins:bm,level:Math.round(a.level*w1+m.level*w2),date,isYesterday:iy,isNextDay:in2});});
  bl.sort((a,b)=>a.mins-b.mins);
  if(isToday&&cur){const nm=toMins(cur);let lv=cur.level;for(let i=0;i<bl.length;i++){if(nm<bl[i].mins){if(i>0){const p=bl[i-1],n=bl[i];lv=Math.round(p.level+(n.level-p.level)*(nm-p.mins)/(n.mins-p.mins));}break;}}const idx=bl.findIndex(t=>t.mins>nm);const c={...cur,level:lv,date:ts};if(idx===-1)bl.push(c);else bl.splice(idx,0,c);}
  return bl;
}
function scaleTides(data,scale,tc,isToday){return data.map(item=>{if(item.isCurrent)return isToday?item:null;const nm=toMins(item)+tc;return{...item,time:minsToTime(nm),mins:nm,level:Math.round(item.level*scale)};}).filter(Boolean);}
function toMins(item){if(!item)return 0;if(item.mins!=null)return item.mins;if(!item.time)return 0;const[h,m]=item.time.split(':').map(Number),b=h*60+m;if(item.isYesterday)return b-1440;if(item.isNextDay)return b+1440;return b;}

  const now2=new Date(),nm2=now2.getHours()*60+now2.getMinutes();

  const maxL=nearHigh?nearHigh.level:0;

    const nm=toMins(cur),nextTide=data.find(d=>!d.isCurrent&&toMins(d)>nm),isFalling=nextTide?.type==='low';
    if(nextTide){const diff=toMins(nextTide)-nm,h=Math.floor(diff/60),m=diff%60;document.getElementById('status-pill').textContent=isFalling?'↓ 빠지는 중':'↑ 차오르는 중';document.getElementById('timeleft-pill').textContent=`${isFalling?'간조':'만조'} ${h>0?h+'시간 ':''}${m}분 전`;}
    document.querySelector('.tide-status-row').style.display='flex';
    document.getElementById('gauge-rail').style.display='flex';
    document.getElementById('ocean-water').style.opacity='1';
    document.getElementById('horizon').style.opacity='1';
    const pct=maxL>minL?((cur.level-minL)/(maxL-minL))*100:50;
    setOceanLevel(pct,isFalling,true);
    updateGaugeLabels(data,cur);
  } else {
    document.getElementById('level-big').innerHTML=`<div style="display:flex;flex-direction:column;gap:12px;margin-top:5px;"><div style="display:flex;align-items:baseline;gap:10px;"><span style="color:#5ba4f5;font-size:0.85rem;font-weight:700;text-shadow:0 1px 4px rgba(0,0,0,0.6);">▲ 최고</span><span style="font-family:'DM Mono',monospace;font-size:3.5rem;font-weight:300;line-height:1;letter-spacing:-3px;color:#fff;text-shadow:0 2px 20px rgba(0,0,0,.7),0 4px 40px rgba(0,0,0,.5);">${maxL}<span style="font-size:1.2rem;opacity:.4;margin-left:2px;">cm</span></span></div><div style="display:flex;align-items:baseline;gap:10px;"><span style="color:#ff6b6b;font-size:0.85rem;font-weight:700;text-shadow:0 1px 4px rgba(0,0,0,0.6);">▼ 최저</span><span style="font-family:'DM Mono',monospace;font-size:3.5rem;font-weight:300;line-height:1;letter-spacing:-3px;color:#fff;text-shadow:0 2px 20px rgba(0,0,0,.7),0 4px 40px rgba(0,0,0,.5);">${minL}<span style="font-size:1.2rem;opacity:.4;margin-left:2px;">cm</span></span></div></div>`;
    document.querySelector('.tide-status-row').style.display='none';
    document.getElementById('gauge-rail').style.display='none';
    document.getElementById('ocean-water').style.opacity='0';
    document.getElementById('horizon').style.opacity='0';
  }

  const dateText=isToday?'오늘 물때':`${sel.getMonth()+1}월 ${sel.getDate()}일 (${WEEKDAYS[sel.getDay()]}) 물때`;
  const tnBadge=tn?`<span style="background:var(--accent);color:#040d18;font-size:.5rem;font-weight:900;padding:2px 8px;border-radius:10px;margin-left:6px;">${tn}</span>`:'';
  document.getElementById('panel-title').innerHTML=dateText+tnBadge;
  document.getElementById('tide-list').innerHTML=data.map(item=>{
    if(item.isCurrent){const now=new Date(),ts=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');return `<div class="tide-row is-current"><div class="tr-left"><div class="tr-icon" style="color:var(--accent)">📍</div><div><div class="tr-level">${item.level}cm</div><div class="tr-label">현재 예상 수위</div></div></div><div class="tr-time">${ts}</div></div>`;}
    const isH=item.type==='high',color=isH?'#5ba4f5':'#ff6b6b',isDim=item.isYesterday||item.isNextDay;
    const tag=item.isYesterday?'<span class="day-tag">어제</span>':item.isNextDay?'<span class="day-tag">내일</span>':'';
    return `<div class="tide-row ${isDim?'is-dim':''}"><div class="tr-left"><div class="tr-icon" style="color:${color}">${isH?'▲':'▼'}</div><div><div class="tr-level">${item.level}cm${tag}</div><div class="tr-label">${isH?'만조':'간조'}</div></div></div><div class="tr-time">${item.time}</div></div>`;
  }).join('');
}

function showLoading(){document.getElementById('tide-list').innerHTML=`<div class="loading"><div class="ld-dots"><div class="ld-dot"></div><div class="ld-dot"></div><div class="ld-dot"></div></div><div class="ld-text">데이터 로딩 중</div></div>`;}
function showError(msg){document.getElementById('tide-list').innerHTML=`<div class="err-msg">⚠️ ${msg}</div>`;document.getElementById('hero-inner').style.display='none';}

/* ── 날씨 ── */
async function loadWeather(lat,lng){
  try{
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=wind_speed_10m,wind_direction_10m,weather_code&daily=weather_code,wind_speed_10m_max,wind_direction_10m_dominant&wind_speed_unit=ms&timezone=Asia/Seoul`;
    const res=await fetch(url);const data=await res.json();
    const wxIcon=document.getElementById('wx-icon'),wxText=document.getElementById('wx-text'),wxWind=document.getElementById('wx-wind');
    const maxForecastDays=data.daily&&data.daily.time?data.daily.time.length:0;
    if(selectedDateOffset<0||selectedDateOffset>=maxForecastDays){wxIcon.style.display='none';wxWind.style.display='none';wxText.textContent=selectedDateOffset<0?'과거 날씨 조회 불가':'예보 기간 초과 (데이터 없음)';currentWeatherCode=0;if(currentStation)applyTheme(STATIONS[currentStation]?.region,0);updateSkyObjects(0);document.getElementById('weather').classList.add('show');return;}
    let wCode,wSpeed,wDir;
    if(selectedDateOffset===0){wCode=data.current.weather_code;wSpeed=data.current.wind_speed_10m;wDir=data.current.wind_direction_10m;}
    else{wCode=data.daily.weather_code[selectedDateOffset];wSpeed=data.daily.wind_speed_10m_max[selectedDateOffset];wDir=data.daily.wind_direction_10m_dominant[selectedDateOffset];}
    currentWeatherCode=wCode;if(currentStation)applyTheme(STATIONS[currentStation]?.region,wCode);updateSkyObjects(wCode);
    const dirs=["북","북동","동","남동","남","남서","서","북서"],dir=dirs[Math.round(wDir/45)%8]||"북";
    const emo=v=>v===0?"☀️":v<=2?"🌤":v===3?"☁️":v<=48?"🌫":v<=55?"🌦":v<=65?"🌧":v<=75?"❄️":v<=82?"🌧":"⛈";
    const wn=v=>v===0?"맑음":v<=2?"대체로 맑음":v===3?"흐림":v<=48?"안개":v<=55?"이슬비":v<=65?"비":v<=75?"눈":v<=82?"소나기":"뇌우";
    const wl=v=>v<1.5?"잔잔":v<3.3?"약한":v<5.4?"산들":v<7.9?"건들":v<10.7?"흔들":"강풍";
    wxIcon.style.display='inline';wxWind.style.display='none';
    wxIcon.textContent=emo(wCode);wxText.textContent=`${wn(wCode)} · ${dir}풍 ${wl(wSpeed)} ${wSpeed.toFixed(1)}m/s`;
    document.getElementById('weather').classList.add('show');
  }catch(e){console.error("날씨 로딩 실패:",e);}
}

/* ── 달력 ── */
let calY,calM;
function openCalendar(){const s=getOffsetDate(selectedDateOffset);calY=s.getFullYear();calM=s.getMonth();renderCal();document.getElementById('cal-overlay').classList.add('open');document.getElementById('cal-sheet').classList.add('open');}
function closeCalendar(){document.getElementById('cal-overlay').classList.remove('open');document.getElementById('cal-sheet').classList.remove('open');}
function calShiftMonth(d){let newM=calM+d,newY=calY;if(newM>11){newM=0;newY++;}if(newM<0){newM=11;newY--;}const today=new Date();today.setHours(0,0,0,0);const minDate=new Date(today);minDate.setDate(minDate.getDate()-1);if(newY<minDate.getFullYear()||(newY===minDate.getFullYear()&&newM<minDate.getMonth()))return;calM=newM;calY=newY;renderCal();}
function calGoToday(){closeCalendar();goToday();}
function shiftDate(d){if(selectedDateOffset+d<-1)return;selectedDateOffset+=d;updateLunarDisplay();updateDateNav();if(currentStation){loadTide(currentStation);const s=STATIONS[currentStation];loadWeather(s.lat,s.lng);}}
function goToday(){if(selectedDateOffset===0)return;selectedDateOffset=0;updateLunarDisplay();updateDateNav();if(currentStation){loadTide(currentStation);const s=STATIONS[currentStation];loadWeather(s.lat,s.lng);}}
function calSelectDate(y,m,d){const t=new Date();t.setHours(0,0,0,0);selectedDateOffset=Math.round((new Date(y,m,d)-t)/86400000);updateLunarDisplay();updateDateNav();if(currentStation){loadTide(currentStation);const s=STATIONS[currentStation];loadWeather(s.lat,s.lng);}closeCalendar();}
function renderCal(){
  const today=new Date();today.setHours(0,0,0,0);const sel=getOffsetDate(selectedDateOffset);sel.setHours(0,0,0,0);
  const max=new Date(today);max.setDate(max.getDate()+60);const min=new Date(today);min.setDate(min.getDate()-1);
  document.getElementById('cal-month-label').textContent=`${calY}년 ${calM+1}월`;
  const fd=new Date(calY,calM,1).getDay(),ld=new Date(calY,calM+1,0).getDate();
  const days=['일','월','화','수','목','금','토'];
  let h=days.map((d,i)=>`<div class="cal-day-lbl" style="${i===0?'color:#ff6b6b':i===6?'color:#5ba4f5':''}">${d}</div>`).join('');
  const pl=new Date(calY,calM,0).getDate();
  for(let i=0;i<fd;i++)h+=`<div class="cal-day other-month">${pl-fd+1+i}</div>`;
  for(let d=1;d<=ld;d++){const td=new Date(calY,calM,d);td.setHours(0,0,0,0);const iT=td.getTime()===today.getTime(),iS=td.getTime()===sel.getTime(),iF=td>max,iP=td<min,dw=td.getDay();const isOut=iF||iP;const cls=['cal-day',iT&&!iS?'today':'',iS?'selected':'',dw===0?'sunday':dw===6?'saturday':'',isOut?'other-month':''].filter(Boolean).join(' ');h+=`<div class="${cls}" ${isOut?'':'onclick="calSelectDate('+calY+','+calM+','+d+')"'}>${d}</div>`;}
  const rem=((fd+ld)%7===0?0:7-((fd+ld)%7));for(let i=1;i<=rem;i++)h+=`<div class="cal-day other-month">${i}</div>`;
  document.getElementById('cal-grid').innerHTML=h;
}

/* ── 새로고침 ── */
async function refresh(){if(!currentStation)return;const btn=document.getElementById('refresh-btn');btn.classList.add('spinning');setTimeout(()=>btn.classList.remove('spinning'),800);const s=STATIONS[currentStation];await Promise.all([loadTide(currentStation),loadWeather(s.lat,s.lng)]);}

/* ── 스플래시 ── */
function makeSplashStars(){const c=document.getElementById('splash-stars');for(let i=0;i<55;i++){const s=document.createElement('div');s.className='splash-star';s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*60}%;--d:${2+Math.random()*4}s;--delay:${Math.random()*4}s;--op:${.3+Math.random()*.7};width:${Math.random()<.2?3:2}px;height:${Math.random()<.2?3:2}px;background:#fff;border-radius:50%;`;c.appendChild(s);}}
function setSplashProg(pct,text,dur){const w=document.getElementById('splash-water'),d=dur??1.1;w.style.transition=pct===0?'none':`height ${d}s cubic-bezier(.2,.8,.3,1)`;w.style.height=(pct*.62)+'%';if(text)document.getElementById('splash-status').textContent=text;}
function hideSplash(){const el=document.getElementById('splash');el.classList.add('hide');setTimeout(()=>el.style.display='none',800);}

/* ── 시작 ── */
window.addEventListener('DOMContentLoaded',async()=>{
  makeSplashStars();updateLunarDisplay();updateDateNav();applyTheme('jeju',0);setOceanLevel(40,false,false);
  fetch('https://raykkfvchlfsjtlkbpji.supabase.co/functions/v1/get-tide-data',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${SUPABASE_KEY}`},body:JSON.stringify({obsCode:'DT_0004',date:dateToStr(getOffsetDate(0)),isToday:true})}).catch(()=>{});
  await new Promise(r=>setTimeout(r,500));
  const last=localStorage.getItem('lastStation');
  if(!last||!STATIONS[last]){setTimeout(()=>setSplashProg(60,'',1.4),100);setTimeout(hideSplash,1400);return;}
  const region=STATIONS[last].region,rInfo=REGION_INFO[region];
  document.getElementById('loc-icon').textContent=EMOJI[last]||'📍';
  document.getElementById('loc-text').textContent=`${rInfo.label} · ${last}`;
  currentStation=last;applyTheme(region,0);
  setSplashProg(10,'관측소 확인 중',.8);
  const s=STATIONS[last];const wp=loadWeather(s.lat,s.lng).catch(()=>{});
  let td=null;
  for(let a=0;a<2;a++){try{const ds=dateToStr(getOffsetDate(0));setSplashProg(35,'조석 데이터 수신 중',1.2);if(s.type==='blend'){const[r1,r2]=await Promise.all([getTideData(s.obs1,ds,true),getTideData(s.obs2,ds,true)]);td=blendTides(r1,r2,s.w1,s.w2,s.timeCorr,true);}else if(s.type==='scale'){td=scaleTides(await getTideData(s.obs,ds,true),s.scale,s.timeCorr,true);}else{td=await getTideData(s.obs,ds,true);}setSplashProg(75,'데이터 처리 중',1.5);if(td&&td.length>0)break;await new Promise(r=>setTimeout(r,500));}catch(e){td=null;await new Promise(r=>setTimeout(r,500));}}
  await wp;setSplashProg(95,'화면 준비 중',1.0);await new Promise(r=>setTimeout(r,200));
  if(td&&td.length>0){td.sort((a,b)=>toMins(a)-toMins(b));const now=new Date(),nm=now.getHours()*60+now.getMinutes(),lv=calcLive(td);td.push({isCurrent:true,level:lv,time:minsToTime(nm),type:'current',mins:nm});td.sort((a,b)=>toMins(a)-toMins(b));const cl=td.filter(d=>d&&(d.isCurrent||d.time));if(cl.length){renderTide(cl,last,true);document.getElementById('panel-upd').textContent=new Date().toLocaleTimeString('ko-KR');}}
  setSplashProg(100,'준비 완료 ✓',.5);await new Promise(r=>setTimeout(r,380));hideSplash();
});

setInterval(()=>{if(currentStation&&selectedDateOffset===0)refresh();},600000);
if('serviceWorker' in navigator)navigator.serviceWorker.register('/seatime/sw.js').catch(()=>{});

function toggleTextSize(){const htmlEl=document.documentElement,btn=document.getElementById('text-size-btn');if(htmlEl.classList.contains('large-text')){htmlEl.classList.remove('large-text');localStorage.setItem('textSize','normal');if(btn)btn.textContent='🔍';}else{htmlEl.classList.add('large-text');localStorage.setItem('textSize','large');if(btn)btn.textContent='➖';}}
function initTextSize(){const savedSize=localStorage.getItem('textSize'),btn=document.getElementById('text-size-btn');if(savedSize==='large'){document.documentElement.classList.add('large-text');if(btn)btn.textContent='➖';}}
initTextSize();
</script>
