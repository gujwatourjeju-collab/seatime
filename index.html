<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>바당때</title>
<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/gujwatourjeju-collab/seatime/main/logo.png">
<link rel="apple-touch-icon" href="https://raw.githubusercontent.com/gujwatourjeju-collab/seatime/main/logo.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="바당때">
<meta name="theme-color" content="#071320">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --accent: #00e5c3;
  --water-top: #00b4d8;
  --water-mid: #0077b6;
  --water-deep: #023e8a;
  --sky: #071320;
}

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--sky);
  color: #fff;
  height: 100dvh;
  overflow: hidden;
  position: relative;
}

/* ════════════════════════════════
   SPLASH
════════════════════════════════ */
#splash {
  position: fixed; inset: 0; z-index: 9999;
  background: #040d18;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  overflow: hidden;
  transition: opacity 0.8s ease, transform 0.8s ease;
}
#splash.hide { opacity: 0; transform: scale(1.05); pointer-events: none; }

.splash-stars { position: absolute; inset: 0; overflow: hidden; }
.splash-star {
  position: absolute; border-radius: 50%; opacity: 0;
  animation: sTwinkle var(--d,3s) ease-in-out var(--delay,0s) infinite;
}
@keyframes sTwinkle { 0%,100%{opacity:0} 50%{opacity:var(--op,.5)} }

#splash-water {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 0%; transition: height 0s; pointer-events: none;
}
.s-water-body {
  position: absolute; top: -60px; left: 0; right: 0; bottom: 0;
  background: linear-gradient(180deg,
    rgba(0,180,216,0) 0%,
    rgba(0,150,200,.25) 20%,
    rgba(0,100,160,.55) 50%,
    rgba(2,50,120,.9) 100%
  );
}
.s-wave {
  position: absolute; top: 0; left: -60%; width: 220%; height: 60px;
  border-radius: 50%; background: rgba(0,229,195,.3);
  animation: sWave 3.5s ease-in-out infinite;
}
.s-wave2 {
  position: absolute; top: 14px; left: -40%; width: 180%; height: 40px;
  border-radius: 50%; background: rgba(0,180,216,.18);
  animation: sWave 5.5s ease-in-out -2s infinite;
}
@keyframes sWave { 0%,100%{transform:translateX(0)} 50%{transform:translateX(-9%)} }

.splash-content {
  position: relative; z-index: 2;
  display: flex; flex-direction: column; align-items: center;
}
.splash-logo {
  width: 72px; height: 72px; border-radius: 18px;
  object-fit: cover; margin-bottom: 20px;
  box-shadow: 0 0 40px rgba(0,229,195,.35);
  animation: sFloat 3s ease-in-out infinite;
}
@keyframes sFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
.splash-title {
  font-size: 1.1rem; font-weight: 300; letter-spacing: 6px;
  color: rgba(255,255,255,.5); text-transform: uppercase;
}
.splash-title-ko {
  font-size: 2.2rem; font-weight: 900; letter-spacing: -1px;
  margin-top: -2px;
  background: linear-gradient(135deg, #fff 30%, var(--accent));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.splash-sub {
  font-size: .62rem; font-weight: 500; color: rgba(255,255,255,.35);
  letter-spacing: 1.2px; margin-top: 8px;
}
#splash-status {
  margin-top: 24px; font-size: .58rem; font-weight: 500;
  letter-spacing: 3px; color: rgba(255,255,255,.25); min-height: 1em;
}

/* ════════════════════════════════
   OCEAN — 화면 전체가 수위 게이지
════════════════════════════════ */
#ocean {
  position: fixed; inset: 0; z-index: 0;
  overflow: hidden;
}

/* 하늘 배경 */
#ocean-sky {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, #071320 0%, #0d2a4a 50%, #0a3d5c 100%);
  transition: background 4s ease, filter 4s ease;
}

/* 물 레이어 — height로 수위 조절 */
#ocean-water {
  position: absolute; left: 0; right: 0; bottom: 0;
  height: 40%;
  /* 차오를 때: 0→height (ease-in)  빠질 때: height→0 (ease-out) */
  transition: height 5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

#water-body {
  position: absolute; inset: 0;
  background: linear-gradient(180deg,
    rgba(0,180,216,.05) 0%,
    rgba(0,150,200,.35) 6%,
    rgba(0,100,160,.65) 30%,
    rgba(2,50,120,.92) 70%,
    rgba(1,30,80,1) 100%
  );
  transition: background 4s ease;
}

/* 수면 파도 — 3겹 SVG */
#waves {
  position: absolute; top: 0; left: 0; right: 0;
  height: 80px; overflow: hidden;
}
.wave-svg {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
}
.wave-path-1 { animation: waveDrift1 6s ease-in-out infinite; }
.wave-path-2 { animation: waveDrift2 9s ease-in-out infinite; }
.wave-path-3 { animation: waveDrift3 12s ease-in-out -4s infinite; }
@keyframes waveDrift1 { 0%,100%{transform:translateX(0)} 50%{transform:translateX(-6%)} }
@keyframes waveDrift2 { 0%,100%{transform:translateX(-4%)} 50%{transform:translateX(5%)} }
@keyframes waveDrift3 { 0%,100%{transform:translateX(3%)} 50%{transform:translateX(-5%)} }

/* 물속 빛 굴절 */
.shimmer {
  position: absolute; top: 0; bottom: 0;
  width: 1px;
  background: linear-gradient(180deg, transparent 0%, rgba(0,229,195,.12) 40%, transparent 100%);
  animation: shimmerAnim var(--d,8s) ease-in-out var(--delay,0s) infinite;
  opacity: 0;
  transform-origin: top;
}
@keyframes shimmerAnim {
  0%,100%{opacity:0;transform:scaleY(.2) skewX(-15deg)}
  40%,60%{opacity:1;transform:scaleY(1) skewX(-10deg)}
}

/* 수평선 라인 */
#horizon {
  position: absolute; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg,
    transparent 0%, rgba(0,229,195,.3) 20%,
    rgba(0,200,220,.6) 50%, rgba(0,229,195,.3) 80%, transparent 100%
  );
  box-shadow: 0 0 12px rgba(0,229,195,.25), 0 0 40px rgba(0,180,216,.15);
  transition: top 5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  pointer-events: none;
}

/* ════════════════════════════════
   수위 게이지 — 우측 세로 바
════════════════════════════════ */
#gauge-rail {
  position: fixed; right: 18px; top: 0; bottom: 0;
  width: 2px; z-index: 20;
  display: flex; flex-direction: column; align-items: center;
  pointer-events: none;
}
#gauge-track {
  position: absolute; top: 80px; bottom: 80px;
  width: 2px; background: rgba(255,255,255,.08);
  border-radius: 1px;
}
#gauge-fill-bar {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(180deg, rgba(0,229,195,.4), rgba(0,180,216,.6));
  border-radius: 1px;
  transition: height 5s cubic-bezier(0.25,0.46,0.45,0.94);
  height: 40%;
}
#gauge-dot {
  position: absolute; left: 50%; transform: translateX(-50%);
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent);
  border: 2px solid #071320;
  box-shadow: 0 0 8px rgba(0,229,195,.7);
  transition: bottom 5s cubic-bezier(0.25,0.46,0.45,0.94);
}
/* 만조 라벨 - 상단 */
#gauge-high-label {
  position: absolute; right: 26px; top: 72px;
  text-align: right; pointer-events: none;
}
#gauge-high-val {
  font-family: 'DM Mono', monospace; font-size: .7rem;
  font-weight: 500; color: rgba(255,255,255,.6);
  display: block;
}
#gauge-high-name {
  font-size: .5rem; font-weight: 700; color: rgba(255,255,255,.3);
  letter-spacing: 1px;
}
/* 간조 라벨 - 하단 */
#gauge-low-label {
  position: absolute; right: 26px; bottom: 72px;
  text-align: right; pointer-events: none;
}
#gauge-low-val {
  font-family: 'DM Mono', monospace; font-size: .7rem;
  font-weight: 500; color: rgba(255,255,255,.4);
  display: block;
}
#gauge-low-name {
  font-size: .5rem; font-weight: 700; color: rgba(255,255,255,.2);
  letter-spacing: 1px;
}

/* ════════════════════════════════
   앱 레이아웃 — 물 위에 자연스럽게
════════════════════════════════ */
#app {
  position: fixed; inset: 0; z-index: 10;
  width: 100%; max-width: 480px; margin: 0 auto;
  display: flex; flex-direction: column;
  pointer-events: none;
}
#app > * { pointer-events: auto; }

/* ── 헤더 ── */
#header {
  padding: calc(env(safe-area-inset-top, 44px) + 8px) 20px 0;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.hdr-left { display: flex; align-items: center; gap: 10px; }
.hdr-logo {
  width: 30px; height: 30px; border-radius: 8px; object-fit: cover;
  opacity: .85;
}
.hdr-brand {
  font-size: .72rem; font-weight: 700; letter-spacing: 3px;
  color: rgba(255,255,255,.45); text-transform: uppercase;
}
.hdr-sub {
  font-size: .45rem; font-weight: 400; color: rgba(255,255,255,.22);
  letter-spacing: .3px; margin-top: 1px;
}
.hdr-right { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; }
#clock {
  font-family: 'DM Mono', monospace; font-size: .95rem; font-weight: 400;
  color: rgba(255,255,255,.7); letter-spacing: 1px; line-height: 1;
}
#lunar {
  font-size: .55rem; font-weight: 500; color: rgba(255,255,255,.3);
  letter-spacing: .3px;
}

/* ── 컨트롤 바 ── */
#controls {
  padding: 10px 16px 0; display: flex; gap: 8px; flex-shrink: 0;
}
.loc-btn, .date-nav {
  flex: 1; display: flex; align-items: center;
  padding: 8px 12px; border-radius: 12px; gap: 6px;
  background: rgba(0,0,0,.3);
  border: 1px solid rgba(255,255,255,.1);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  color: rgba(255,255,255,.8); font-size: .72rem; font-weight: 600;
  cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
  transition: all .2s; min-width: 0;
}
.loc-btn:active, .date-nav-btn:active { background: rgba(0,229,195,.1); }
.loc-text { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.loc-arrow { font-size:.55rem; opacity:.4; flex-shrink:0; }
.date-nav { padding: 0; overflow: hidden; }
.date-nav-btn {
  width: 30px; height: 100%; flex-shrink: 0;
  background: none; border: none; color: rgba(255,255,255,.45);
  font-size: 1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.date-nav-btn:active { color: var(--accent); }
.date-nav-ctr {
  flex: 1; text-align: center; padding: 8px 2px;
  cursor: pointer; min-width: 0;
}
.date-solar { font-family:'DM Mono',monospace; font-size:.68rem; color:#fff; }
.date-label { font-size:.5rem; font-weight:700; color:var(--accent); margin-top:1px; letter-spacing:.5px; }

/* ── 날씨 ── */
#weather {
  display: none; align-items: center; gap: 8px;
  padding: 8px 20px 0; flex-shrink: 0;
}
#weather.show { display: flex; }
.wx-icon { font-size: .95rem; }
.wx-text { flex: 1; font-size: .65rem; font-weight: 600; color: rgba(255,255,255,.55); }
.wx-wind { font-family:'DM Mono',monospace; font-size:.7rem; color:var(--accent); }

/* ── 중앙 수위 정보 ── */
#hero {
  flex: 1;
  display: flex; flex-direction: column;
  justify-content: center; align-items: flex-start;
  padding: 0 24px;
  pointer-events: none;
}
#hero-inner { display: none; flex-direction: column; gap: 4px; }
.tide-badge {
  display: inline-block;
  background: rgba(0,229,195,.15);
  border: 1px solid rgba(0,229,195,.3);
  backdrop-filter: blur(8px);
  color: var(--accent); font-size: .62rem; font-weight: 900;
  padding: 3px 10px; border-radius: 20px; letter-spacing: .5px;
  align-self: flex-start;
}
.tide-desc {
  font-size: .6rem; color: rgba(255,255,255,.42); font-weight: 500;
  margin-top: 2px; margin-bottom: 6px;
}
#level-big {
  font-family: 'DM Mono', monospace;
  font-size: 5rem; font-weight: 300; line-height: 1;
  letter-spacing: -4px;
  color: #fff;
  text-shadow: 0 0 60px rgba(0,229,195,.4), 0 2px 40px rgba(0,0,0,.4);
}
#level-unit { font-size: 1.5rem; opacity: .4; margin-left: 2px; vertical-align: bottom; }
.tide-status-row {
  display: flex; align-items: center; gap: 8px; margin-top: 2px;
}
.status-pill {
  background: rgba(0,0,0,.25); backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,.1);
  padding: 4px 10px; border-radius: 20px;
  font-size: .65rem; font-weight: 700; color: var(--accent);
}
.timeleft-pill {
  background: rgba(0,0,0,.25); backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,.08);
  padding: 4px 10px; border-radius: 20px;
  font-family: 'DM Mono', monospace;
  font-size: .62rem; color: rgba(255,255,255,.55);
}
.station-pill {
  font-size: .55rem; color: rgba(255,255,255,.25);
  font-weight: 600; letter-spacing: .5px; margin-top: 4px;
}

/* ── 조석 패널 (하단) ── */
#tide-panel {
  flex-shrink: 0;
  max-height: 44dvh;
  display: flex; flex-direction: column;
}

/* 상단 페이드 마스크 */
#tide-panel::before {
  content: '';
  display: block; flex-shrink: 0;
  height: 32px;
  background: linear-gradient(180deg, transparent, rgba(0,0,0,.0));
  pointer-events: none;
}

.panel-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px 6px; flex-shrink: 0;
}
.panel-title {
  font-size: .58rem; font-weight: 700; color: rgba(255,255,255,.3);
  letter-spacing: 2px; text-transform: uppercase;
}
.panel-upd {
  font-family: 'DM Mono', monospace;
  font-size: .52rem; color: rgba(255,255,255,.18);
}

.tide-scroll {
  overflow-y: auto; padding: 0 16px;
  scrollbar-width: none; flex: 1;
}
.tide-scroll::-webkit-scrollbar { display: none; }

/* 조석 아이템 — 카드 박스 없이 */
.tide-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 6px;
  border-bottom: 1px solid rgba(255,255,255,.05);
  transition: opacity .2s;
}
.tide-row:last-child { border-bottom: none; }
.tide-row.is-current {
  padding: 10px 6px;
  border-bottom: 1px solid rgba(0,229,195,.1);
  border-top: 1px solid rgba(0,229,195,.1);
  margin: 2px 0;
}
.tide-row.is-dim { opacity: .3; }

.tr-left { display: flex; align-items: center; gap: 10px; }
.tr-icon { font-size: .8rem; width: 14px; text-align: center; }
.tr-level {
  font-family: 'DM Mono', monospace; font-size: .88rem;
  font-weight: 500; color: #fff;
}
.tr-label { font-size: .55rem; color: rgba(255,255,255,.3); font-weight: 600; margin-top: 1px; }
.tr-time {
  font-family: 'DM Mono', monospace; font-size: .82rem;
  font-weight: 400; color: rgba(255,255,255,.45);
}
.day-tag {
  font-size: .5rem; background: rgba(255,255,255,.07);
  color: rgba(255,255,255,.35); padding: 1px 5px;
  border-radius: 4px; font-weight: 700; margin-left: 5px;
  vertical-align: middle;
}

/* 로딩/에러/빈 상태 */
.loading {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; height: 80px; gap: 10px;
}
.ld-dots { display: flex; gap: 4px; }
.ld-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--accent); opacity: .25;
  animation: ldPulse 1.2s ease-in-out infinite;
}
.ld-dot:nth-child(2){animation-delay:.2s}
.ld-dot:nth-child(3){animation-delay:.4s}
@keyframes ldPulse { 0%,100%{opacity:.25;transform:scale(1)} 50%{opacity:1;transform:scale(1.4)} }
.ld-text { font-size:.62rem; font-weight:700; color:rgba(255,255,255,.25); letter-spacing:1px; }
.err-msg { text-align:center; padding:16px; color:#ff6b6b; font-size:.75rem; font-weight:700; }
.empty {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; height:80px; gap:8px;
  color:rgba(255,255,255,.2);
}
.empty-icon { font-size:1.8rem; opacity:.3; }
.empty-text { font-size:.7rem; font-weight:700; text-align:center; line-height:1.6; }

/* 푸터 */
#footer {
  padding: 6px 20px calc(env(safe-area-inset-bottom, 16px) + 6px);
  text-align: center; flex-shrink: 0;
}
.credit { font-size:.5rem; color:rgba(255,255,255,.15); font-weight:600; }
.credit a { color:rgba(255,255,255,.18); text-decoration:none; }

/* ── 새로고침 ── */
#refresh-btn {
  position: fixed;
  bottom: calc(env(safe-area-inset-bottom, 16px) + 16px);
  right: 36px; /* 게이지 왼쪽 */
  width: 42px; height: 42px; border-radius: 50%;
  background: rgba(0,0,0,.4);
  border: 1px solid rgba(0,229,195,.3);
  backdrop-filter: blur(12px);
  color: var(--accent); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s; z-index: 100;
}
#refresh-btn:active { transform: scale(.9); }
#refresh-btn.spinning svg { animation: spin .8s linear; }
@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

/* ── 시트 ── */
.sheet-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,.6); opacity: 0;
  pointer-events: none; transition: opacity .3s;
}
.sheet-overlay.open { opacity: 1; pointer-events: auto; }
.sheet {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 201;
  max-width: 480px; margin: 0 auto;
  background: #071420; border-radius: 24px 24px 0 0;
  border-top: 1px solid rgba(0,229,195,.12);
  transform: translateY(100%);
  transition: transform .35s cubic-bezier(.4,0,.2,1);
  padding-bottom: env(safe-area-inset-bottom);
}
.sheet.open { transform: translateY(0); }
.sheet-handle { width:36px; height:4px; border-radius:2px; background:rgba(255,255,255,.12); margin:12px auto 0; }
.sheet-step { padding:16px 20px 24px; }
.sheet-title { font-size:.6rem; font-weight:700; letter-spacing:2.5px; color:rgba(255,255,255,.3); text-transform:uppercase; margin-bottom:14px; }
.region-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.region-item {
  display:flex; align-items:center; gap:10px; padding:14px 16px;
  border-radius:16px; border:1px solid rgba(255,255,255,.07);
  background:rgba(255,255,255,.03); cursor:pointer; transition:all .2s;
}
.region-item:active { transform:scale(.97); }
.region-item.active { background:rgba(0,229,195,.1); border-color:rgba(0,229,195,.35); }
.region-emoji { font-size:1.4rem; }
.region-label { font-size:.88rem; font-weight:900; }
.region-count { font-size:.58rem; color:rgba(255,255,255,.3); font-weight:600; margin-top:1px; }
.sheet-back { display:flex; align-items:center; gap:6px; font-size:.68rem; font-weight:700; color:rgba(255,255,255,.3); cursor:pointer; margin-bottom:14px; background:none; border:none; padding:0; font-family:'Noto Sans KR',sans-serif; }
.station-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
.station-item {
  display:flex; flex-direction:column; align-items:center; gap:4px;
  padding:12px 8px; border-radius:14px;
  border:1px solid rgba(255,255,255,.07);
  background:rgba(255,255,255,.03); cursor:pointer; transition:all .2s; text-align:center;
}
.station-item:active { transform:scale(.95); }
.station-item.active { background:rgba(0,229,195,.1); border-color:rgba(0,229,195,.35); }
.station-item-emoji { font-size:1.1rem; }
.station-item-name { font-size:.68rem; font-weight:700; color:rgba(255,255,255,.75); }
.station-item.active .station-item-name { color:var(--accent); }

/* 달력 */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cal-month-label{font-size:.9rem;font-weight:900;}

const WEATHER_FILTER = {
  0:'none', 1:'none', 2:'brightness(.9) saturate(.85)',
  3:'brightness(.72) saturate(.6)',
  45:'brightness(.62) saturate(.45)', 48:'brightness(.62) saturate(.45)',
  51:'brightness(.68) saturate(.55)', 53:'brightness(.65) saturate(.5)', 55:'brightness(.62) saturate(.48)',
  61:'brightness(.52) saturate(.42) hue-rotate(10deg)',
  63:'brightness(.46) saturate(.38) hue-rotate(12deg)',
  65:'brightness(.42) saturate(.32) hue-rotate(15deg)',
  80:'brightness(.38) saturate(.28)', 95:'brightness(.3) saturate(.2)'
};

let currentRegion = 'jeju';
let currentWeatherCode = 0;

function getFilter(code) {
  const keys = Object.keys(WEATHER_FILTER).map(Number).sort((a,b)=>a-b);
  let f = 'none';
  for (const k of keys) { if (code >= k) f = WEATHER_FILTER[k]; }
  return f;
}

function applyTheme(region, wCode) {
  currentRegion = region || 'jeju';
  currentWeatherCode = wCode || 0;
  const t = THEMES[currentRegion];
  const sky = document.getElementById('ocean-sky');
  sky.style.background = t.sky;
  sky.style.filter = getFilter(currentWeatherCode);
  document.getElementById('water-body').style.background = t.wb;
  document.querySelectorAll('.wave-path-1').forEach(p=>p.setAttribute('fill',t.w1));
  document.querySelectorAll('.wave-path-2').forEach(p=>p.setAttribute('fill',t.w2));
  document.documentElement.style.setProperty('--accent', t.accent);
  document.getElementById('horizon').style.background =
    `linear-gradient(90deg,transparent 0%,${t.horizonColor} 30%,${t.horizonColor} 70%,transparent 100%)`;
  buildShimmers(t.accent);
}

function buildShimmers(color) {
  // 기존 shimmer 제거 후 재생성
  document.querySelectorAll('.shimmer').forEach(s=>s.remove());
  const wb = document.getElementById('water-body');
  for (let i=0;i<7;i++){
    const s = document.createElement('div');
    s.className = 'shimmer';
    s.style.cssText = `left:${8+i*13}%;height:${55+Math.random()*45}%;--d:${6+Math.random()*8}s;--delay:${Math.random()*6}s;background:linear-gradient(180deg,transparent 0%,${color}18 45%,transparent 100%)`;
    wb.appendChild(s);
  }
}

/* ════ 수위 → 화면 높이 ════ */
let _lastPct = 40;
let _isFalling = false;

function setOceanLevel(pct, isFalling, animate = true) {
  _lastPct = pct;
  _isFalling = isFalling;

  const minH = 12, maxH = 78;
  const h = minH + (pct / 100) * (maxH - minH);
  const water = document.getElementById('ocean-water');
  const horizon = document.getElementById('horizon');
  const fillBar = document.getElementById('gauge-fill-bar');
  const dot = document.getElementById('gauge-dot');

  if (!animate) {
    water.style.transition = 'none';
    horizon.style.transition = 'none';
    fillBar.style.transition = 'none';
    dot.style.transition = 'none';
    void water.offsetWidth;
    water.style.height = h + '%';
    horizon.style.top = (100 - h) + '%';
    fillBar.style.height = pct + '%';
    dot.style.bottom = `calc(${pct}% - 4px)`;
    setTimeout(() => {
      water.style.transition = '';
      horizon.style.transition = '';
      fillBar.style.transition = '';
      dot.style.transition = '';
    }, 50);
    return;
  }

  if (isFalling) {
    // 간조로 향할 때: 먼저 현재 수위보다 높게 순간 세팅 후 → 쫙 빠짐
    const highH = Math.max(h + 25, 70); // 일단 높게
    water.style.transition = 'none';
    horizon.style.transition = 'none';
    fillBar.style.transition = 'none';
    dot.style.transition = 'none';
    void water.offsetWidth;
    water.style.height = highH + '%';
    horizon.style.top = (100 - highH) + '%';
    fillBar.style.height = Math.min((highH - minH) / (maxH - minH) * 100, 100) + '%';
    void water.offsetWidth; // force reflow
    // 잠깐 후 빠르게 내려감
    setTimeout(() => {
      const ease = 'cubic-bezier(0.6, 0, 0.8, 0.5)'; // 빠른 시작, 느린 마무리
      water.style.transition = `height 4.5s ${ease}`;
      horizon.style.transition = `top 4.5s ${ease}`;
      fillBar.style.transition = `height 4.5s ${ease}`;
      dot.style.transition = `bottom 4.5s ${ease}`;
      water.style.height = h + '%';
      horizon.style.top = (100 - h) + '%';
      fillBar.style.height = pct + '%';
      dot.style.bottom = `calc(${pct}% - 4px)`;
    }, 80);
  } else {
    // 만조로 향할 때: 먼저 현재 수위보다 낮게 순간 세팅 후 → 천천히 차오름
    const lowH = Math.min(h - 25, 20); // 일단 낮게
    water.style.transition = 'none';
    horizon.style.transition = 'none';
    fillBar.style.transition = 'none';
    dot.style.transition = 'none';
    void water.offsetWidth;
    water.style.height = Math.max(lowH, minH) + '%';
    horizon.style.top = (100 - Math.max(lowH, minH)) + '%';
    fillBar.style.height = Math.max(0, (Math.max(lowH, minH) - minH) / (maxH - minH) * 100) + '%';
    void water.offsetWidth;
    setTimeout(() => {
      const ease = 'cubic-bezier(0.2, 0.5, 0.4, 1)'; // 느린 시작, 자연스러운 차오름
      water.style.transition = `height 5s ${ease}`;
      horizon.style.transition = `top 5s ${ease}`;
      fillBar.style.transition = `height 5s ${ease}`;
      dot.style.transition = `bottom 5s ${ease}`;
      water.style.height = h + '%';
      horizon.style.top = (100 - h) + '%';
      fillBar.style.height = pct + '%';
      dot.style.bottom = `calc(${pct}% - 4px)`;
    }, 80);
  }
}

function updateGaugeLabels(data, current) {
  const tides = data.filter(d=>!d.isCurrent);
  const now = toMins(current);
  const nextTide = tides.find(d=>toMins(d)>now);
  const prevTide = [...tides].reverse().find(d=>toMins(d)<=now);
  const isFalling = nextTide?.type === 'low';

  let highTide, lowTide;
  if (isFalling) {
    highTide = prevTide?.type==='high' ? prevTide : tides.filter(d=>d.type==='high').sort((a,b)=>Math.abs(toMins(a)-now)-Math.abs(toMins(b)-now))[0];
    lowTide = nextTide?.type==='low' ? nextTide : tides.find(d=>d.type==='low'&&toMins(d)>now);
  } else {
    lowTide = prevTide?.type==='low' ? prevTide : tides.filter(d=>d.type==='low').sort((a,b)=>Math.abs(toMins(a)-now)-Math.abs(toMins(b)-now))[0];
    highTide = nextTide?.type==='high' ? nextTide : tides.find(d=>d.type==='high'&&toMins(d)>now);
  }

  document.getElementById('gauge-high-val').textContent = highTide ? highTide.level+'cm' : '--';
  document.getElementById('gauge-low-val').textContent = lowTide ? lowTide.level+'cm' : '--';
}

/* ── 로드 ── */
async function loadTide(name){
  showLoading();
  document.getElementById('hero-inner').style.display='none';
  try{
    const s=STATIONS[name],dateStr=dateToStr(getOffsetDate(selectedDateOffset)),isToday=selectedDateOffset===0;
    let td=[];
    if(s.type==='blend'){const[r1,r2]=await Promise.all([getTideData(s.obs1,dateStr,isToday),getTideData(s.obs2,dateStr,isToday)]);td=blendTides(r1,r2,s.w1,s.w2,s.timeCorr,isToday);}
    else if(s.type==='scale'){td=scaleTides(await getTideData(s.obs,dateStr,isToday),s.scale,s.timeCorr,isToday);}
    else{td=await getTideData(s.obs,dateStr,isToday);}
    td.sort((a,b)=>toMins(a)-toMins(b));
    if(isToday&&td.length>0){
      const now=new Date(),nm=now.getHours()*60+now.getMinutes(),lv=calcLive(td);
      td.push({isCurrent:true,level:lv,time:minsToTime(nm),type:'current',mins:nm});
      td.sort((a,b)=>toMins(a)-toMins(b));
    }
    const cl=td.filter(d=>d&&(d.isCurrent||d.time));
    if(!cl.length){showError('데이터 없음');return;}
    renderTide(cl,name,isToday);
    document.getElementById('panel-upd').textContent=new Date().toLocaleTimeString('ko-KR');
  }catch(e){showError('오류: '+e.message);console.error(e);}
}

function calcLive(data){
  if(!data||data.length<2)return 0;
  const now=new Date(),nm=now.getHours()*60+now.getMinutes();
  const past=[...data].reverse().find(d=>!d.isCurrent&&toMins(d)<=nm);
  const future=data.find(d=>!d.isCurrent&&toMins(d)>nm);
  if(!past||!future)return data[0]?.level||0;
  const td=toMins(future)-toMins(past),ld=future.level-past.level,prog=(nm-toMins(past))/td;
  return Math.round(past.level+(ld*(1-Math.cos(prog*Math.PI))/2));
}

function blendTides(d1,d2,w1,w2,tc,isToday){
  const t1=d1.filter(d=>!d.isCurrent),t2=d2.filter(d=>!d.isCurrent),cur=d1.find(d=>d.isCurrent);
  const used=new Set(),bl=[];
  const ts=dateToStr(getOffsetDate(selectedDateOffset)),ps=dateToStr(getOffsetDate(selectedDateOffset-1)),ns=dateToStr(getOffsetDate(selectedDateOffset+1));
  t1.forEach(a=>{
    const m=t2.filter(b=>b.type===a.type&&!used.has(b.time+b.date)&&b.date===a.date).sort((a2,b2)=>Math.abs(toMins(a2)-toMins(a))-Math.abs(toMins(b2)-toMins(a)))[0];
    if(!m)return;used.add(m.time+m.date);
    const bm=Math.round(toMins(a)*w1+toMins(m)*w2)+tc;
    let date,iy=false,in2=false;
    if(bm<0){date=ps;iy=true;}else if(bm>=1440){date=ns;in2=true;}else{date=ts;}
    bl.push({...a,time:minsToTime(bm),mins:bm,level:Math.round(a.level*w1+m.level*w2),date,isYesterday:iy,isNextDay:in2});
  });
  bl.sort((a,b)=>a.mins-b.mins);
  if(isToday&&cur){
    const nm=toMins(cur);let lv=cur.level;
    for(let i=0;i<bl.length;i++){if(nm<bl[i].mins){if(i>0){const p=bl[i-1],n=bl[i];lv=Math.round(p.level+(n.level-p.level)*(nm-p.mins)/(n.mins-p.mins));}break;}}
    const idx=bl.findIndex(t=>t.mins>nm);
    const c={...cur,level:lv,date:ts};
    if(idx===-1)bl.push(c);else bl.splice(idx,0,c);
  }
  return bl;
}
function scaleTides(data,scale,tc,isToday){return data.map(item=>{if(item.isCurrent)return isToday?item:null;const nm=toMins(item)+tc;return{...item,time:minsToTime(nm),mins:nm,level:Math.round(item.level*scale)};}).filter(Boolean);}
function toMins(item){
  if(!item)return 0;if(item.mins!=null)return item.mins;if(!item.time)return 0;
  const[h,m]=item.time.split(':').map(Number),b=h*60+m;
  if(item.isYesterday)return b-1440;if(item.isNextDay)return b+1440;return b;
}
function minsToTime(m){const a=((m%1440)+1440)%1440;return String(Math.floor(a/60)).padStart(2,'0')+':'+String(a%60).padStart(2,'0');}

/* ── 렌더 ── */
function renderTide(data,name,isToday){
  data.sort((a,b)=>toMins(a)-toMins(b));
  const sel=getOffsetDate(selectedDateOffset),ld=getLunarDay(sel),region=STATIONS[name]?.region,tn=getTideName(ld,region);

  if(isToday){
    const cur=data.find(d=>d.isCurrent);
    if(!cur){showError('현재 데이터 없음');return;}
    document.getElementById('hero-inner').style.display='flex';
    document.getElementById('hero-inner').style.flexDirection='column';
    document.getElementById('hero-inner').style.gap='4px';
    document.getElementById('level-big').innerHTML=cur.level+'<span id="level-unit">cm</span>';

    const badge=document.getElementById('tide-badge');
    const descEl=document.getElementById('tide-desc');
    if(tn){
      badge.textContent=tn;
      badge.style.display='inline-block';
      if(descEl){ descEl.textContent=TIDE_DESC[tn]||''; descEl.style.display=TIDE_DESC[tn]?'block':'none'; }
    } else {
      badge.style.display='none';
      if(descEl) descEl.style.display='none';
    }

    const nm=toMins(cur),nextTide=data.find(d=>!d.isCurrent&&toMins(d)>nm);
    const isFalling=nextTide?.type==='low';
    if(nextTide){
      const diff=toMins(nextTide)-nm,h=Math.floor(diff/60),m=diff%60;
      document.getElementById('status-pill').textContent=isFalling?'↓ 빠지는 중':'↑ 차오르는 중';
      document.getElementById('timeleft-pill').textContent=`${isFalling?'간조':'만조'} ${h>0?h+'시간 ':''}${m}분 전`;
    }
    document.getElementById('station-pill').textContent=`📍 ${name}`;

    // 수위 계산
    const levels=data.filter(d=>!d.isCurrent).map(d=>d.level);
    const minL=Math.min(...levels),maxL=Math.max(...levels);
    const pct=maxL>minL?((cur.level-minL)/(maxL-minL))*100:50;
    setOceanLevel(pct,isFalling,true);
    updateGaugeLabels(data,cur);
  } else {
    document.getElementById('hero-inner').style.display='none';
    setOceanLevel(40,false,true);
  }

  // 패널
  const dateText=isToday?'오늘 물때':`${sel.getMonth()+1}월 ${sel.getDate()}일 (${WEEKDAYS[sel.getDay()]}) 물때`;
  const tnBadge=tn?`<span style="background:var(--accent);color:#040d18;font-size:.5rem;font-weight:900;padding:2px 8px;border-radius:10px;margin-left:6px;">${tn}</span>`:'';
  document.getElementById('panel-title').innerHTML=dateText+tnBadge;

  document.getElementById('tide-list').innerHTML=data.map(item=>{
    if(item.isCurrent){
      const now=new Date(),ts=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
      return `<div class="tide-row is-current">
        <div class="tr-left">
          <div class="tr-icon" style="color:var(--accent)">📍</div>
          <div><div class="tr-level">${item.level}cm</div><div class="tr-label">현재 예상 수위</div></div>
        </div>
        <div class="tr-time">${ts}</div>
      </div>`;
    }
    const isH=item.type==='high',color=isH?'#5ba4f5':'#ff6b6b';
    const isDim=item.isYesterday||item.isNextDay;
    const tag=item.isYesterday?'<span class="day-tag">어제</span>':item.isNextDay?'<span class="day-tag">내일</span>':'';
    return `<div class="tide-row ${isDim?'is-dim':''}">
      <div class="tr-left">
        <div class="tr-icon" style="color:${color}">${isH?'▲':'▼'}</div>
        <div><div class="tr-level">${item.level}cm${tag}</div><div class="tr-label">${isH?'만조':'간조'}</div></div>
      </div>
      <div class="tr-time">${item.time}</div>
    </div>`;
  }).join('');
}

function renderCal(){
  const today=new Date();today.setHours(0,0,0,0);const sel=getOffsetDate(selectedDateOffset);sel.setHours(0,0,0,0);
  const max=new Date(today);max.setDate(max.getDate()+60);
  document.getElementById('cal-month-label').textContent=`${calY}년 ${calM+1}월`;
  const fd=new Date(calY,calM,1).getDay(),ld=new Date(calY,calM+1,0).getDate();
  const days=['일','월','화','수','목','금','토'];
  let h=days.map((d,i)=>`<div class="cal-day-lbl" style="${i===0?'color:#ff6b6b':i===6?'color:#5ba4f5':''}">${d}</div>`).join('');
  const pl=new Date(calY,calM,0).getDate();
  for(let i=0;i<fd;i++)h+=`<div class="cal-day other-month">${pl-fd+1+i}</div>`;
  for(let d=1;d<=ld;d++){
    const td=new Date(calY,calM,d);td.setHours(0,0,0,0);
    const iT=td.getTime()===today.getTime(),iS=td.getTime()===sel.getTime(),iF=td>max,dw=td.getDay();
    const cls=['cal-day',iT&&!iS?'today':'',iS?'selected':'',dw===0?'sunday':dw===6?'saturday':'',iF?'other-month':''].filter(Boolean).join(' ');
    h+=`<div class="${cls}" ${iF?'':'onclick="calSelectDate('+calY+','+calM+','+d+')"'}>${d}</div>`;
  }
  const rem=((fd+ld)%7===0?0:7-((fd+ld)%7));
  for(let i=1;i<=rem;i++)h+=`<div class="cal-day other-month">${i}</div>`;
  document.getElementById('cal-grid').innerHTML=h;
}

/* ── 새로고침 ── */
async function refresh(){
  if(!currentStation)return;
  const btn=document.getElementById('refresh-btn');btn.classList.add('spinning');
  setTimeout(()=>btn.classList.remove('spinning'),800);
  const s=STATIONS[currentStation];
  await Promise.all([loadTide(currentStation),loadWeather(s.lat,s.lng)]);
}

/* ── 스플래시 ── */
function makeSplashStars(){
  const c=document.getElementById('splash-stars');
  for(let i=0;i<55;i++){const s=document.createElement('div');s.className='splash-star';s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*60}%;--d:${2+Math.random()*4}s;--delay:${Math.random()*4}s;--op:${.3+Math.random()*.7};width:${Math.random()<.2?3:2}px;height:${Math.random()<.2?3:2}px;background:#fff;border-radius:50%;`;c.appendChild(s);}
}
function setSplashProg(pct,text,dur){
  const w=document.getElementById('splash-water'),d=dur??1.1;
  w.style.transition=pct===0?'none':`height ${d}s cubic-bezier(.2,.8,.3,1)`;
  w.style.height=(pct*.62)+'%';
  if(text)document.getElementById('splash-status').textContent=text;
}
function hideSplash(){const el=document.getElementById('splash');el.classList.add('hide');setTimeout(()=>el.style.display='none',800);}

/* ── 시작 ── */
window.addEventListener('DOMContentLoaded',async()=>{
  makeSplashStars();
  updateLunarDisplay();updateDateNav();
  applyTheme('jeju',0);setOceanLevel(40,false,false);

  // 깨우기
  fetch('https://raykkfvchlfsjtlkbpji.supabase.co/functions/v1/get-tide-data',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${SUPABASE_KEY}`},body:JSON.stringify({obsCode:'DT_0004',date:dateToStr(getOffsetDate(0)),isToday:true})}).catch(()=>{});
  await new Promise(r=>setTimeout(r,500));

  const last=localStorage.getItem('lastStation');
  if(!last||!STATIONS[last]){setTimeout(()=>setSplashProg(60,'',1.4),100);setTimeout(hideSplash,1400);return;}

  const region=STATIONS[last].region,rInfo=REGION_INFO[region];
  document.getElementById('loc-icon').textContent=EMOJI[last]||'📍';
  document.getElementById('loc-text').textContent=`${rInfo.label} · ${last}`;
  currentStation=last;applyTheme(region,0);

  setSplashProg(10,'관측소 확인 중',.8);
  const s=STATIONS[last];
  const wp=loadWeather(s.lat,s.lng).catch(()=>{});
  let td=null;

  for(let a=0;a<2;a++){
    try{
      const ds=dateToStr(getOffsetDate(0));
      setSplashProg(35,'조석 데이터 수신 중',1.2);
      if(s.type==='blend'){const[r1,r2]=await Promise.all([getTideData(s.obs1,ds,true),getTideData(s.obs2,ds,true)]);td=blendTides(r1,r2,s.w1,s.w2,s.timeCorr,true);}
      else if(s.type==='scale'){td=scaleTides(await getTideData(s.obs,ds,true),s.scale,s.timeCorr,true);}
      else{td=await getTideData(s.obs,ds,true);}
      setSplashProg(75,'데이터 처리 중',1.5);
      if(td&&td.length>0)break;
      await new Promise(r=>setTimeout(r,500));
    }catch(e){td=null;await new Promise(r=>setTimeout(r,500));}
  }

  await wp;
  setSplashProg(95,'화면 준비 중',1.0);
  await new Promise(r=>setTimeout(r,200));

  if(td&&td.length>0){
    td.sort((a,b)=>toMins(a)-toMins(b));
    const now=new Date(),nm=now.getHours()*60+now.getMinutes(),lv=calcLive(td);
    td.push({isCurrent:true,level:lv,time:minsToTime(nm),type:'current',mins:nm});
    td.sort((a,b)=>toMins(a)-toMins(b));
    const cl=td.filter(d=>d&&(d.isCurrent||d.time));
    if(cl.length){renderTide(cl,last,true);document.getElementById('panel-upd').textContent=new Date().toLocaleTimeString('ko-KR');}
  }

  setSplashProg(100,'준비 완료 ✓',.5);
  await new Promise(r=>setTimeout(r,380));
  hideSplash();
});

setInterval(()=>{if(currentStation&&selectedDateOffset===0)refresh();},600000);
if('serviceWorker' in navigator)navigator.serviceWorker.register('/seatime/sw.js').catch(()=>{});
</script>

<!-- 관리자 수집 버튼 -->
<button id="collect-btn" onclick="runCollect()" style="position:fixed;bottom:80px;right:36px;z-index:999;background:rgba(255,107,107,.8);color:#fff;border:none;border-radius:50%;width:40px;height:40px;font-size:1rem;cursor:pointer;backdrop-filter:blur(8px);border:1px solid rgba(255,107,107,.4);">🔄</button>
<div id="collect-status" style="display:none;position:fixed;bottom:130px;right:16px;z-index:999;background:#071420;border:1px solid var(--accent);border-radius:14px;padding:10px 14px;font-size:.65rem;font-weight:700;color:#fff;min-width:180px;"></div>
<script>
async function runCollect(){
  const btn=document.getElementById('collect-btn'),st=document.getElementById('collect-status');
  btn.disabled=true;st.style.display='block';
  for(let i=0;i<29;i++){
    st.innerHTML=`🌊 수집 중... ${i+1}/29<br><div style="margin-top:5px;background:rgba(255,255,255,.1);border-radius:3px;height:3px;"><div style="background:var(--accent);height:3px;border-radius:3px;width:${Math.round((i/29)*100)}%;"></div></div>`;
    try{
      const r=await fetch('https://raykkfvchlfsjtlkbpji.supabase.co/functions/v1/collect-tide',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${SUPABASE_KEY}`},body:JSON.stringify({obsIndex:i})});
      const d=await r.json();if(!r.ok){st.innerHTML=`❌ 오류 (${i})<br>${d.error||''}`;btn.disabled=false;return;}
      await new Promise(r=>setTimeout(r,300));
    }catch(e){st.innerHTML=`❌ ${e.message}`;btn.disabled=false;return;}
  }
  st.innerHTML=`✅ 완료!`;btn.disabled=false;btn.style.background='rgba(0,196,167,.8)';
}
</script>
